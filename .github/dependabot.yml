# Dependabot configuration
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # npm ecosystem — root package.json
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      minor:
        update-types:
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    open-pull-requests-limit: 10

  # npm ecosystem — scripts/
  - package-ecosystem: "npm"
    directory: "/scripts"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      minor:
        update-types:
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    open-pull-requests-limit: 5

  # npm ecosystem — tests/
  - package-ecosystem: "npm"
    directory: "/tests"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      minor:
        update-types:
          - "minor"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    open-pull-requests-limit: 5

  # GitHub Actions — keep SHA-pinned actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
    open-pull-requests-limit: 10
