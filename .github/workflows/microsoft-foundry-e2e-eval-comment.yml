name: Microsoft Foundry E2E Eval Comment Dispatch

on:
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: read
  issues: write
  pull-requests: read

jobs:
  dispatch:
    name: Dispatch Microsoft Foundry E2E eval
    if: >
      github.event.issue.pull_request &&
      (
        contains(github.event.comment.body, '@copilot run foundry e2e') ||
        contains(github.event.comment.body, '/foundry-e2e')
      )
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch eval workflow
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            let collaboratorPermission;
            try {
              const response = await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: context.payload.comment.user.login,
              });
              collaboratorPermission = response.data;
            } catch (error) {
              if (error.status === 404) {
                core.info('Ignoring command from commenter without repository access.');
                return;
              }
              throw error;
            }

            const allowedPermissions = new Set(['admin', 'maintain', 'write']);
            const permission = collaboratorPermission.permission;
            const roleName = collaboratorPermission.role_name;
            if (!allowedPermissions.has(permission) && !allowedPermissions.has(roleName)) {
              core.info(`Ignoring command from commenter with ${permission} permission and ${roleName} role.`);
              return;
            }

            const prNumber = context.payload.issue.number;
            const { data: pullRequest } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            if (pullRequest.state !== 'open') {
              core.info(`Ignoring command on ${pullRequest.state} PR #${prNumber}.`);
              return;
            }

            const body = context.payload.comment.body;
            const commandPattern = /^(?:@copilot\s+run\s+foundry\s+e2e|\/foundry-e2e)(?:\s+branch=([A-Za-z0-9._/-]+))?$/i;
            const commandLine = body
              .split(/\r?\n/)
              .map((line) => line.trim())
              .find((line) =>
                /^(?:@copilot\s+run\s+foundry\s+e2e|\/foundry-e2e)\b/i.test(line)
              );

            if (!commandLine) {
              core.info('No exact Microsoft Foundry E2E command line found.');
              return;
            }

            const commandMatch = commandPattern.exec(commandLine);
            if (!commandMatch) {
              core.setFailed(
                'Invalid command. Use "@copilot run foundry e2e" or "@copilot run foundry e2e branch=<branch>".'
              );
              return;
            }

            const ref = commandMatch[1] || 'main';
            if (
              ref.includes('..') ||
              ref.startsWith('/') ||
              ref.endsWith('/') ||
              ref.endsWith('.') ||
              ref.includes('@{') ||
              ref.split('/').some((part) => part.startsWith('.') || part.endsWith('.lock'))
            ) {
              core.setFailed(`Invalid branch/ref: ${ref}`);
              return;
            }

            try {
              await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: ref,
              });
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(`Branch does not exist in this repository: ${ref}`);
                return;
              }
              throw error;
            }

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'microsoft-foundry-e2e-eval.yml',
              ref,
              inputs: {
                target_pr_id: prNumber.toString(),
              },
            });

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: `Dispatched Microsoft Foundry E2E eval on \`${ref}\` with \`target_pr_id=${prNumber}\`.`,
            });
