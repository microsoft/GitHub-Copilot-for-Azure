name: PR Plugin Version Check

on:
  pull_request:
    branches: [main]
    paths:
      - "plugin/.plugin/plugin.json"
      - "plugin/.claude-plugin/plugin.json"
      - "plugin/.cursor-plugin/plugin.json"

permissions:
  contents: read
  pull-requests: read

jobs:
  check-plugin-modifications:
    runs-on: ubuntu-latest
    name: Check Plugin Version Not Modified

    steps:
      - name: Checkout PR head
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Install dependencies for plugin checks
        run: |
          cd scripts
          npm ci

      - name: Check plugin version changes
        run: |
          echo "Checking that plugin.json versions are placeholders..."
          cd scripts && npm run checkPluginVersionPr
