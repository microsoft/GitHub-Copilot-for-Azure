# Reusable Workflow: Test a Skill
#
# This workflow is called by per-skill test workflows.
# It runs Jest tests for a specific skill and reports results.

name: Test Skill (Reusable)

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      skill-name:
        description: 'Name of the skill to test'
        required: true
        type: string
      node-version:
        description: 'Node.js version to use'
        required: false
        type: string
        default: '20'

jobs:
  test:
    name: Test ${{ inputs.skill-name }}
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests for ${{ inputs.skill-name }}
        env:
          CI: true
          SKILL_NAME: ${{ inputs.skill-name }}
        run: npm run test:ci -- --testPathPattern="$SKILL_NAME"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: test-results-${{ inputs.skill-name }}
          path: tests/reports/junit.xml
          retention-days: 30

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-${{ inputs.skill-name }}
          path: tests/coverage/
          retention-days: 30

      - name: Test Report Summary
        if: always()
        env:
          SKILL_NAME: ${{ inputs.skill-name }}
        run: |
          echo "## Test Results - $SKILL_NAME" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f reports/junit.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' reports/junit.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' reports/junit.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' reports/junit.xml | head -1 | grep -o '[0-9]*')
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          fi
