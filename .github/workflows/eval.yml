name: Run Skill Evaluations

on:
  pull_request:
    paths:
      - 'evals/**'
      - 'plugin/skills/**'
      - '.vally.yaml'
  schedule:
    - cron: '0 6 * * *' # Nightly at 06:00 UTC
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - triggers
          - integration
          - smoke
      pr_number:
        description: 'PR number (for fork testing)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '22'

      - name: Install vally-cli
        run: npm install --no-save --ignore-scripts @microsoft/vally-cli@^0.4.0

      - name: Lint skill and eval specs
        run: npx @microsoft/vally-cli lint plugin/skills/ --eval evals/ --strict

      - name: Determine suite
        if: github.event_name != 'pull_request'
        id: suite
        shell: bash
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=${{ inputs.suite || 'full' }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=full" >> "$GITHUB_OUTPUT"
          fi

      - name: Run evaluations
        if: github.event_name != 'pull_request'
        run: |
          npx @microsoft/vally-cli eval \
            --eval-spec evals/azure-deploy/eval.yaml \
            --output-dir ./results \
            --output jsonl \
            --junit \
            --threshold 0.8
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}

      - name: Upload results
        if: github.event_name != 'pull_request' && always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: eval-results
          path: results/
          retention-days: 30

