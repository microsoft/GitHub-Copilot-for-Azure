name: Run Skill Evaluations
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  eval:
    name: Run Evaluations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
      - name: Install vally
        run: npm install --no-save @microsoft/vally
      - name: Run evaluations
        run: npx @microsoft/vally eval --eval-spec evals/azure-hosted-copilot-sdk/eval.yaml --output-dir ./results --output jsonl
        env:
          GITHUB_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: eval-results
          path: ./results
          retention-days: 30

