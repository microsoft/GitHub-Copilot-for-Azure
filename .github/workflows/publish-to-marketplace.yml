name: Publish to marketplace repos

on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-to-microsoft-skills:
    if: github.repository == 'microsoft/GitHub-Copilot-for-Azure'
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the current repo
      - name: Checkout current repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: source-repo

      # 2. Clone the main branch of microsoft/skills and create a feature branch
      - name: Clone microsoft/skills and create feature branch
        env:
          GH_TOKEN: ${{ secrets.SKILLS_REPO_PAT }} # A PAT that has content: write and pull-request: write permissions to the microsoft/skills repo
        run: |
          gh repo clone microsoft/skills target-repo -- --branch main --single-branch

          cd target-repo
          BRANCH_NAME="sync/copilot-for-azure-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      # 3. Record current version before syncing
      - name: Record current version
        id: version
        run: |
          TARGET_DIR="target-repo/.github/plugins/azure-skills/"
          if [ ! -f "${TARGET_DIR}.plugin/plugin.json" ]; then
            echo "::error::plugin.json not found at ${TARGET_DIR}.plugin/plugin.json"
            exit 1
          fi
          CURRENT_VERSION=$(jq -r '.version' "${TARGET_DIR}.plugin/plugin.json")
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT_VERSION"

      # 4. Sync files from source to target (mirror: add new, update existing, remove stale)
      - name: Sync files
        run: |
          SOURCE_DIR="source-repo/plugin/"
          TARGET_DIR="target-repo/.github/plugins/azure-skills/"

          # Ensure target directory exists
          mkdir -p "$TARGET_DIR"

          # Use rsync to mirror source into target:
          #   --archive   preserve permissions, timestamps, etc.
          #   --delete    remove files in target that are no longer in source
          #   --verbose   list changes
          rsync --archive --delete --verbose "$SOURCE_DIR" "$TARGET_DIR"

      # 5. Restore version in plugin.json files to CURRENT_VERSION
      - name: Restore version in plugin.json files
        run: |
          CURRENT_VERSION="${{ steps.version.outputs.current }}"
          TARGET_DIR="target-repo/.github/plugins/azure-skills/"
          for f in "${TARGET_DIR}.claude-plugin/plugin.json" "${TARGET_DIR}.cursor-plugin/plugin.json" "${TARGET_DIR}.plugin/plugin.json"; do
            if [ -f "$f" ]; then
              jq --arg v "$CURRENT_VERSION" '.version = $v' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
              echo "Restored $f to version $CURRENT_VERSION"
            fi
          done

      # 6. Bump version if content changed
      - name: Bump version if content changed
        working-directory: target-repo
        run: |
          VERSION_FILES=(
            ".github/plugins/azure-skills/.claude-plugin/plugin.json"
            ".github/plugins/azure-skills/.cursor-plugin/plugin.json"
            ".github/plugins/azure-skills/.plugin/plugin.json"
          )

          git add --all

          # Check for content changes (non-version-only)
          CHANGED=$(git diff --cached --name-only)
          HAS_CONTENT_CHANGES=false
          if [ -n "$CHANGED" ]; then
            # Non-plugin.json changes are always content changes
            NON_JSON_CHANGES=$(echo "$CHANGED" | grep -v -F '.claude-plugin/plugin.json' | grep -v -F '.cursor-plugin/plugin.json' | grep -v -F '.plugin/plugin.json' || true)
            if [ -n "$NON_JSON_CHANGES" ]; then
              HAS_CONTENT_CHANGES=true
            fi

            # For plugin.json files, detect changes beyond just the version field
            if [ "$HAS_CONTENT_CHANGES" = false ]; then
              PLUGIN_JSON_CHANGES=$(echo "$CHANGED" | grep -F 'plugin.json' || true)
              for file in $PLUGIN_JSON_CHANGES; do
                HEAD_NO_VER=$(git show "HEAD:$file" 2>/dev/null | jq --sort-keys 'del(.version)' 2>/dev/null || echo "")
                STAGED_NO_VER=$(git show ":$file" 2>/dev/null | jq --sort-keys 'del(.version)' 2>/dev/null || echo "")
                if [ "$HEAD_NO_VER" != "$STAGED_NO_VER" ]; then
                  HAS_CONTENT_CHANGES=true
                  echo "Non-version content change detected in $file"
                  break
                fi
              done
            fi
          fi

          if [ "$HAS_CONTENT_CHANGES" = true ]; then
            echo "Content changes detected. Bumping version."
            CURRENT_VERSION="${{ steps.version.outputs.current }}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "Version: $CURRENT_VERSION -> $NEW_VERSION"

            for f in "${VERSION_FILES[@]}"; do
              if [ -f "$f" ]; then
                jq --arg v "$NEW_VERSION" '.version = $v' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
                echo "Updated $f to version $NEW_VERSION"
              fi
            done
          else
            echo "No content changes detected. Skipping version bump."
          fi

          # Reset staging so the commit step handles it cleanly
          git reset HEAD

      # 7. Commit changes and create a PR
      - name: Commit and push changes
        id: commit
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ secrets.SKILLS_REPO_PAT }} # A PAT that has content: write and pull-request: write permissions to the microsoft/skills repo
        run: |
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add --all
          if git diff --cached --quiet; then
            echo "No changes to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Sync plugin files from GitHub-Copilot-for-Azure"
            git push origin "$BRANCH_NAME"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.SKILLS_REPO_PAT }} # A PAT that has content: write and pull-request: write permissions to the microsoft/skills repo
        run: |
          cd target-repo
          gh pr create \
            --repo "microsoft/skills" \
            --base "main" \
            --head "$BRANCH_NAME" \
            --title "Sync plugin files from GitHub-Copilot-for-Azure (run ${{ github.run_id }})" \
            --body "Automated sync of \`plugin/\` from [GitHub-Copilot-for-Azure](${{ github.server_url }}/${{ github.repository }}) at commit \`${{ github.sha }}\`."

  sync-to-microsoft-azure-skills:
    if: github.repository == 'microsoft/GitHub-Copilot-for-Azure'
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the current repo
      - name: Checkout current repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: source-repo

      # 2. Clone the main branch of microsoft/azure-skills and create a feature branch
      - name: Clone microsoft/azure-skills and create feature branch
        env:
          GH_TOKEN: ${{ secrets.AZURE_SKILLS_REPO_PAT }} # A PAT that has content: write and pull-request: write permissions to the microsoft/azure-skills repo
        run: |
          gh repo clone microsoft/azure-skills target-repo -- --branch main --single-branch

          cd target-repo
          BRANCH_NAME="sync/copilot-for-azure-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      # 3. Record current version before syncing
      - name: Record current version
        id: version
        run: |
          TARGET_DIR="target-repo/.github/plugins/azure-skills/"
          if [ ! -f "${TARGET_DIR}.plugin/plugin.json" ]; then
            echo "::error::plugin.json not found at ${TARGET_DIR}.plugin/plugin.json"
            exit 1
          fi
          CURRENT_VERSION=$(jq -r '.version' "${TARGET_DIR}.plugin/plugin.json")
          echo "current=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT_VERSION"

      # 4. Sync files from source to target (mirror: add new, update existing, remove stale)
      - name: Sync files
        run: |
          SOURCE_DIR="source-repo/plugin/"
          TARGET_DIR="target-repo/.github/plugins/azure-skills/"

          # Ensure target directory exists
          mkdir -p "$TARGET_DIR"

          # Use rsync to mirror source into target:
          #   --archive   preserve permissions, timestamps, etc.
          #   --delete    remove files in target that are no longer in source
          #   --verbose   list changes
          rsync --archive --delete --verbose "$SOURCE_DIR" "$TARGET_DIR"

      # 5. Copy plugin.json, .mcp.json, .claude-plugin/plugin.json, skills/, hooks/, and gemini-extension.json to the repo root
      - name: Copy plugin files to repo root
        run: |
          cp "source-repo/plugin/.plugin/plugin.json" "target-repo/plugin.json"
          cp "source-repo/plugin/.mcp.json" "target-repo/.mcp.json"
          mkdir -p "target-repo/.claude-plugin/"
          cp "source-repo/plugin/.claude-plugin/plugin.json" "target-repo/.claude-plugin/plugin.json"
          mkdir -p "target-repo/skills/"
          rsync --archive --delete --verbose "source-repo/plugin/skills/" "target-repo/skills/"
          mkdir -p "target-repo/hooks/"
          rsync --archive --delete --verbose "source-repo/plugin/hooks/" "target-repo/hooks/"
          cp "source-repo/plugin/gemini-extension.json" "target-repo/gemini-extension.json"

          # Clean up stale copilot-hooks.json from repo root (previously copied there, now lives under hooks/)
          rm -f "target-repo/copilot-hooks.json"

      # 6. Replace repository URLs in synced files
      - name: Replace repository URLs
        run: |
          TARGET_DIRS=("target-repo/.github/plugins/azure-skills/" "target-repo/skills/" "target-repo/hooks/" "target-repo/plugin.json" "target-repo/.mcp.json" "target-repo/.claude-plugin/plugin.json" "target-repo/gemini-extension.json")
          for target in "${TARGET_DIRS[@]}"; do
            if [ -e "$target" ]; then
              if matches=$(grep -rli --include='*.md' --include='*.json' 'https://github.com/microsoft/github-copilot-for-azure' "$target"); then
                echo "$matches" | while IFS= read -r file; do
                  sed -i 's|https://github.com/microsoft/GitHub-Copilot-for-Azure|https://github.com/microsoft/azure-skills|g' "$file"
                  sed -i 's|https://github.com/microsoft/github-copilot-for-azure|https://github.com/microsoft/azure-skills|g' "$file"
                done
              fi
            fi
          done

      # 7. Restore version in plugin.json files to CURRENT_VERSION
      - name: Restore version in plugin.json files
        run: |
          CURRENT_VERSION="${{ steps.version.outputs.current }}"
          TARGET_DIR="target-repo/.github/plugins/azure-skills/"
          for f in "${TARGET_DIR}.claude-plugin/plugin.json" "${TARGET_DIR}.cursor-plugin/plugin.json" "${TARGET_DIR}.plugin/plugin.json" "target-repo/plugin.json" "target-repo/.claude-plugin/plugin.json"; do
            if [ -f "$f" ]; then
              jq --arg v "$CURRENT_VERSION" '.version = $v' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
              echo "Restored $f to version $CURRENT_VERSION"
            fi
          done

      # 8. Bump version if content changed
      - name: Bump version if content changed
        working-directory: target-repo
        run: |
          VERSION_FILES=(
            ".github/plugins/azure-skills/.claude-plugin/plugin.json"
            ".github/plugins/azure-skills/.cursor-plugin/plugin.json"
            ".github/plugins/azure-skills/.plugin/plugin.json"
            "plugin.json"
            ".claude-plugin/plugin.json"
          )

          git add --all

          # Check for content changes (non-version-only)
          CHANGED=$(git diff --cached --name-only)
          HAS_CONTENT_CHANGES=false
          if [ -n "$CHANGED" ]; then
            # Non-plugin.json changes are always content changes
            NON_JSON_CHANGES=$(echo "$CHANGED" | grep -v -F '.claude-plugin/plugin.json' | grep -v -F '.cursor-plugin/plugin.json' | grep -v -F '.plugin/plugin.json' | grep -v -x 'plugin.json' || true)
            if [ -n "$NON_JSON_CHANGES" ]; then
              HAS_CONTENT_CHANGES=true
            fi

            # For plugin.json files, detect changes beyond just the version field
            if [ "$HAS_CONTENT_CHANGES" = false ]; then
              PLUGIN_JSON_CHANGES=$(echo "$CHANGED" | grep -F 'plugin.json' || true)
              for file in $PLUGIN_JSON_CHANGES; do
                HEAD_NO_VER=$(git show "HEAD:$file" 2>/dev/null | jq --sort-keys 'del(.version)' 2>/dev/null || echo "")
                STAGED_NO_VER=$(git show ":$file" 2>/dev/null | jq --sort-keys 'del(.version)' 2>/dev/null || echo "")
                if [ "$HEAD_NO_VER" != "$STAGED_NO_VER" ]; then
                  HAS_CONTENT_CHANGES=true
                  echo "Non-version content change detected in $file"
                  break
                fi
              done
            fi
          fi

          if [ "$HAS_CONTENT_CHANGES" = true ]; then
            echo "Content changes detected. Bumping version."
            CURRENT_VERSION="${{ steps.version.outputs.current }}"
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"
            NEW_VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
            echo "Version: $CURRENT_VERSION -> $NEW_VERSION"

            for f in "${VERSION_FILES[@]}"; do
              if [ -f "$f" ]; then
                jq --arg v "$NEW_VERSION" '.version = $v' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
                echo "Updated $f to version $NEW_VERSION"
              fi
            done
          else
            echo "No content changes detected. Skipping version bump."
          fi

          # Reset staging so the commit step handles it cleanly
          git reset HEAD

      # 9. Commit changes and create a PR
      - name: Commit and push changes
        id: commit
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ secrets.AZURE_SKILLS_REPO_PAT }} # A PAT that has content: write and pull-request: write permissions to the microsoft/azure-skills repo
        run: |
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add --all
          if git diff --cached --quiet; then
            echo "No changes to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Sync plugin files from GitHub-Copilot-for-Azure"
            git push origin "$BRANCH_NAME"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.AZURE_SKILLS_REPO_PAT }} # A PAT that has content: write and pull-request: write permissions to the microsoft/azure-skills repo
        run: |
          cd target-repo
          gh pr create \
            --repo "microsoft/azure-skills" \
            --base "main" \
            --head "$BRANCH_NAME" \
            --title "Sync plugin files from GitHub-Copilot-for-Azure (run ${{ github.run_id }})" \
            --body "Automated sync of \`plugin/\` from [GitHub-Copilot-for-Azure](${{ github.server_url }}/${{ github.repository }}) at commit \`${{ github.sha }}\`."
