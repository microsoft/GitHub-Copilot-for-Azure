name: Publish to marketplace repos

on:
  schedule:
    - cron: "0 11 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync-to-microsoft-skills:
    if: github.repository == 'microsoft/GitHub-Copilot-for-Azure'
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the current repo
      - name: Checkout current repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: source-repo
          fetch-depth: 0 # Full history required for NBGV version computation

      # 2. Build the plugin (stamps NBGV versions into output/)
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: source-repo/package-lock.json

      - name: Build plugin
        working-directory: source-repo
        run: |
          npm ci --ignore-scripts
          npm run build

      # Generate a short-lived token from the GitHub App for microsoft/skills
      - name: Generate token for microsoft/skills
        id: skills-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.GHCP4A_BOT_APP_ID }}
          private-key: ${{ secrets.GHCP4A_BOT_PRIVATE_KEY }}
          owner: microsoft
          repositories: skills

      - name: Clone microsoft/skills and create feature branch
        env:
          GH_TOKEN: ${{ steps.skills-token.outputs.token }}
        run: |
          gh repo clone microsoft/skills target-repo -- --branch main --single-branch

          cd target-repo
          BRANCH_NAME="sync/copilot-for-azure-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      # 4. Sync files from source to target (mirror: add new, update existing, remove stale)
      - name: Sync files
        run: |
          SOURCE_ROOT="source-repo/output"
          TARGET_ROOT="target-repo/.github/plugins"

          # Scan immediate child directories under source-repo/output and sync each child
          # to target-repo/.github/plugins/<child-dirname>/.
          find "$SOURCE_ROOT" -mindepth 1 -maxdepth 1 -type d | while IFS= read -r child_dir; do
            child_name=$(basename "$child_dir")
            target_dir="$TARGET_ROOT/$child_name/"

            mkdir -p "$target_dir"

            # Use rsync to mirror each child directory into its corresponding target directory:
            #   --archive   preserve permissions, timestamps, etc.
            #   --delete    remove files in target that are no longer in source child dir
            #   --verbose   list changes
            rsync --archive --delete --verbose "$child_dir/" "$target_dir"
          done

      # 5. Commit changes and create a PR
      - name: Commit and push changes
        id: commit
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ steps.skills-token.outputs.token }}
        run: |
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add --all
          if git diff --cached --quiet; then
            echo "No changes to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Sync plugin files from GitHub-Copilot-for-Azure"
            git push origin "$BRANCH_NAME"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.skills-token.outputs.token }}
        run: |
          cd target-repo
          gh pr create \
            --repo "microsoft/skills" \
            --base "main" \
            --head "$BRANCH_NAME" \
            --title "Sync plugin files from GitHub-Copilot-for-Azure (run ${{ github.run_id }})" \
            --body "Automated sync of \`plugin/\` from [GitHub-Copilot-for-Azure](${{ github.server_url }}/${{ github.repository }}) at commit \`${{ github.sha }}\`."

  sync-to-microsoft-azure-skills:
    if: github.repository == 'microsoft/GitHub-Copilot-for-Azure'
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the current repo
      - name: Checkout current repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: source-repo
          fetch-depth: 0 # Full history required for NBGV version computation

      # 2. Build the plugin (stamps NBGV versions into output/)
      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: source-repo/package-lock.json

      - name: Build plugin
        working-directory: source-repo
        run: |
          npm ci --ignore-scripts
          npm run build

      # Generate a short-lived token from the GitHub App for microsoft/azure-skills
      - name: Generate token for microsoft/azure-skills
        id: azure-skills-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.GHCP4A_BOT_APP_ID }}
          private-key: ${{ secrets.GHCP4A_BOT_PRIVATE_KEY }}
          owner: microsoft
          repositories: azure-skills

      - name: Clone microsoft/azure-skills and create feature branch
        env:
          GH_TOKEN: ${{ steps.azure-skills-token.outputs.token }}
        run: |
          gh repo clone microsoft/azure-skills target-repo -- --branch main --single-branch

          cd target-repo
          BRANCH_NAME="sync/copilot-for-azure-${{ github.run_id }}"
          git checkout -b "$BRANCH_NAME"
          echo "BRANCH_NAME=$BRANCH_NAME" >> "$GITHUB_ENV"

      # 4. Sync files from source to target (mirror: add new, update existing, remove stale)
      - name: Sync files
        run: |
          SOURCE_ROOT="source-repo/output"
          TARGET_ROOT="target-repo/.github/plugins"

          # Scan immediate child directories under source-repo/output and sync each child
          # to target-repo/.github/plugins/<child-dirname>/.
          find "$SOURCE_ROOT" -mindepth 1 -maxdepth 1 -type d | while IFS= read -r child_dir; do
            child_name=$(basename "$child_dir")
            target_dir="$TARGET_ROOT/$child_name/"

            mkdir -p "$target_dir"

            # Use rsync to mirror each child directory into its corresponding target directory:
            #   --archive   preserve permissions, timestamps, etc.
            #   --delete    remove files in target that are no longer in source child dir
            #   --verbose   list changes
            rsync --archive --delete --verbose "$child_dir/" "$target_dir"
          done

      # 5. Copy azure plugin to the repo root
      # The way some agent client installs the azure plugin from 3rd party marketplace requires us to replicate it at the repo root.
      # The azure plugin is added to the following 3rd party marketplaces.
      # - claude-plugins-official: https://github.com/anthropics/claude-plugins-official/blob/main/.claude-plugin/marketplace.json#L429
      # - awesome-copilot: https://github.com/github/awesome-copilot/blob/30472ecf0fe34cc561df958c08501ecc5ca80ea4/.github/plugin/marketplace.json#L121
      # When Claude Code installs from claude-plugins-official, since the entry only configured the azure-skills repo in it,
      # Claude Code will look for the .claude-plugin/plugin.json in the azure-skills repo to discover the plugin files.
      # The relative paths for skills, mcpServers, and hooks are relative to the plugin root and in this case the plugin root is the repo root,
      # which is different from the .github/plugins/azure-skills plugin root when installing it directly from the azure-skills marketplace.
      # We workaround this difference by replicating the plugin files so the agent clients can still find them.
      - name: Copy azure plugin files to repo root
        run: |
          cp "source-repo/output/azure-skills/.plugin/plugin.json" "target-repo/plugin.json"
          cp "source-repo/output/azure-skills/.mcp.json" "target-repo/.mcp.json"
          mkdir -p "target-repo/.claude-plugin/"
          cp "source-repo/output/azure-skills/.claude-plugin/plugin.json" "target-repo/.claude-plugin/plugin.json"
          mkdir -p "target-repo/skills/"
          rsync --archive --delete --verbose "source-repo/output/azure-skills/skills/" "target-repo/skills/"
          mkdir -p "target-repo/hooks/"
          rsync --archive --delete --verbose "source-repo/output/azure-skills/hooks/" "target-repo/hooks/"
          cp "source-repo/output/azure-skills/gemini-extension.json" "target-repo/gemini-extension.json"

          # Clean up stale copilot-hooks.json from repo root (previously copied there, now lives under hooks/)
          rm -f "target-repo/copilot-hooks.json"

      # 6. Replace repository URLs in synced files
      # CHANGELOG.md file contains links to PRs in the GitHub-Copilot-for-Azure repo. These links should not be replaced.
      # Otherwise they will all get 404.
      - name: Replace repository URLs
        run: |
          TARGET_DIRS=("target-repo/.github/plugins/azure-skills/" "target-repo/skills/" "target-repo/hooks/" "target-repo/plugin.json" "target-repo/.mcp.json" "target-repo/.claude-plugin/plugin.json" "target-repo/gemini-extension.json")
          for target in "${TARGET_DIRS[@]}"; do
            if [ -e "$target" ]; then
              if matches=$(grep -rli --include='*.md' --include='*.json' --exclude='CHANGELOG.md' --exclude='changelog-*.md' 'https://github.com/microsoft/github-copilot-for-azure' "$target"); then
                echo "$matches" | while IFS= read -r file; do
                  sed -i 's|https://github.com/microsoft/GitHub-Copilot-for-Azure|https://github.com/microsoft/azure-skills|g' "$file"
                  sed -i 's|https://github.com/microsoft/github-copilot-for-azure|https://github.com/microsoft/azure-skills|g' "$file"
                done
              fi
            fi
          done

      # 7. Commit changes and create a PR
      - name: Commit and push changes
        id: commit
        working-directory: target-repo
        env:
          GH_TOKEN: ${{ steps.azure-skills-token.outputs.token }}
        run: |
          gh auth setup-git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add --all
          if git diff --cached --quiet; then
            echo "No changes to sync."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Sync plugin files from GitHub-Copilot-for-Azure"
            git push origin "$BRANCH_NAME"
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.commit.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.azure-skills-token.outputs.token }}
        run: |
          cd target-repo
          gh pr create \
            --repo "microsoft/azure-skills" \
            --base "main" \
            --head "$BRANCH_NAME" \
            --title "Sync plugin files from GitHub-Copilot-for-Azure (run ${{ github.run_id }})" \
            --body "Automated sync of \`plugins/\` from [GitHub-Copilot-for-Azure](${{ github.server_url }}/${{ github.repository }}) at commit \`${{ github.sha }}\`."
