name: Microsoft Foundry E2E Evaluations

on:
  workflow_dispatch:
    inputs:
      target_pr_id:
        description: "Optional PR number whose Microsoft Foundry skill should be evaluated, including fork PRs"
        required: false
        type: string

permissions: {}

jobs:
  eval:
    name: Run Microsoft Foundry E2E evals
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Override Microsoft Foundry skill from target PR head
        if: ${{ inputs.target_pr_id != '' }}
        shell: bash
        env:
          TARGET_PR_ID: ${{ inputs.target_pr_id }}
        run: |
          set -euo pipefail

          if [[ ! "${TARGET_PR_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::target_pr_id must be a pull request number."
            exit 1
          fi

          pr_head_ref="refs/remotes/origin/target-pr-${TARGET_PR_ID}-head"
          echo "Fetching PR #${TARGET_PR_ID} head from refs/pull/${TARGET_PR_ID}/head."
          git fetch --no-tags --depth=1 origin "+refs/pull/${TARGET_PR_ID}/head:${pr_head_ref}"
          rm -rf plugin/skills/microsoft-foundry
          git restore --source="${pr_head_ref}" --staged --worktree -- plugin/skills/microsoft-foundry

          echo "Using plugin/skills/microsoft-foundry from PR #${TARGET_PR_ID}:"
          git log -1 --oneline "${pr_head_ref}"
          git status --short plugin/skills/microsoft-foundry

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            scripts/package-lock.json
            tests/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@634ad924cf8baef2257898ba5663be8d19f15aca # v2

      - name: Install azd AI agent extension
        run: azd extension install azure.ai.agents

      - name: Login to Azure using OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.FOUNDRY_E2E_EVAL_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.FOUNDRY_E2E_EVAL_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.FOUNDRY_E2E_EVAL_AZURE_SUBSCRIPTION_ID }}

      - name: Check Azure CLI login
        shell: bash
        run: |
          set -euo pipefail
          current_subscription="$(az account show --query id -o tsv)"
          test "$current_subscription" = "${{ secrets.FOUNDRY_E2E_EVAL_AZURE_SUBSCRIPTION_ID }}"
          az account show --output table

      - name: Configure azd authentication
        shell: bash
        run: |
          set -euo pipefail
          azd config set auth.useAzCliAuth "true"
          azd config set defaults.subscription "${{ secrets.FOUNDRY_E2E_EVAL_AZURE_SUBSCRIPTION_ID }}"

      - name: Install repository dependencies
        run: npm ci

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Build plugin output
        run: npm run build

      - name: Run Microsoft Foundry Vally evals
        working-directory: tests
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          FOUNDRY_E2E_EVAL_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_E2E_EVAL_PROJECT_ENDPOINT }}
          FOUNDRY_E2E_EVAL_ARM_RESOURCE: ${{ secrets.FOUNDRY_E2E_EVAL_ARM_RESOURCE }}
          FOUNDRY_E2E_EVAL_DEPLOYMENT_MODEL: ${{ secrets.FOUNDRY_E2E_EVAL_DEPLOYMENT_MODEL }}
          FOUNDRY_E2E_EVAL_ACR: ${{ secrets.FOUNDRY_E2E_EVAL_ACR }}
        run: |
          set -euo pipefail

          npm run test:vally -- \
            --suite foundry-e2e \
            --output jsonl \
            --junit \
            --threshold 0.8

      - name: Upload Vally results
        id: upload-vally-results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: microsoft-foundry-e2e-eval-results
          path: |
            tests/results/
            tests/reports/
          retention-days: 30

      - name: Show Microsoft Foundry E2E eval results
        id: show-eval-results
        if: always()
        shell: bash
        env:
          ARTIFACT_URL: ${{ steps.upload-vally-results.outputs.artifact-url }}
        run: |
          set -euo pipefail

          eval_results_md="$(find ./tests/results -type f -name eval-results.md -printf '%T@ %p\n' | sort -nr | head -n 1 | cut -d' ' -f2- || true)"
          if [[ -z "${eval_results_md}" ]]; then
            echo "::warning::No eval-results.md found under ./tests/results."
            {
              echo "## Microsoft Foundry E2E Evaluation Results"
              echo
              echo "No eval-results.md was found under \`./tests/results\`."
              echo
              echo "## Download"
              echo
              if [[ -n "${ARTIFACT_URL}" ]]; then
                echo "[Download Vally results artifact](${ARTIFACT_URL})"
              else
                echo "Vally results artifact URL is unavailable."
              fi
            } >> "${GITHUB_STEP_SUMMARY}"
            exit 0
          fi
          echo "eval_results_md=${eval_results_md}" >> "${GITHUB_OUTPUT}"

          echo "Microsoft Foundry E2E eval results: ${eval_results_md}"
          echo
          cat "${eval_results_md}"
          echo

          if [[ -n "${ARTIFACT_URL}" ]]; then
            echo "Vally results artifact: ${ARTIFACT_URL}"
          else
            echo "::warning::Vally results artifact URL is unavailable."
          fi

          {
            echo "## Microsoft Foundry E2E Evaluation Results"
            echo
            cat "${eval_results_md}"
            echo
            echo "## Download"
            echo
            if [[ -n "${ARTIFACT_URL}" ]]; then
              echo "[Download Vally results artifact](${ARTIFACT_URL})"
            else
              echo "Vally results artifact URL is unavailable."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Comment Microsoft Foundry E2E eval results on PR
        if: ${{ always() && inputs.target_pr_id != '' }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          TARGET_PR_ID: ${{ inputs.target_pr_id }}
          EVAL_RESULTS_MD: ${{ steps.show-eval-results.outputs.eval_results_md }}
          ARTIFACT_URL: ${{ steps.upload-vally-results.outputs.artifact-url }}
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const fs = require('fs');

            const targetPrId = (process.env.TARGET_PR_ID ?? '').trim();
            if (!/^[0-9]+$/.test(targetPrId)) {
              throw new Error(`target_pr_id must be a pull request number; got ${targetPrId}.`);
            }

            const serverUrl = process.env.GITHUB_SERVER_URL || 'https://github.com';
            const runUrl = `${serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = (process.env.ARTIFACT_URL ?? '').trim();
            const evalResultsPath = (process.env.EVAL_RESULTS_MD ?? '').trim();
            const jobStatus = (process.env.JOB_STATUS ?? 'unknown').trim();
            let evalResults = 'No eval-results.md was found under `./tests/results`.';

            if (evalResultsPath && fs.existsSync(evalResultsPath)) {
              evalResults = fs.readFileSync(evalResultsPath, 'utf8').trim();
            }

            const maxEvalResultsLength = 50000;
            if (evalResults.length > maxEvalResultsLength) {
              evalResults = `${evalResults.slice(0, maxEvalResultsLength)}\n\n...truncated. See the workflow run or artifact for the full eval results.`;
            }

            const lines = [
              `Microsoft Foundry E2E eval finished for PR #${targetPrId}.`,
              '',
              `Workflow run: ${runUrl}`,
              `Job status: ${jobStatus}`,
            ];
            if (artifactUrl) {
              lines.push(`Vally results artifact: ${artifactUrl}`);
            }
            lines.push('', '## eval-results.md', '', evalResults);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(targetPrId),
              body: lines.join('\n'),
            });
