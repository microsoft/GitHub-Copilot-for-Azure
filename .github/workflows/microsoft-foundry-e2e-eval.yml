name: Microsoft Foundry E2E Evaluations

on:
  workflow_dispatch:
    inputs:
      stimulus_id:
        description: "Optional stimulus id tag to run, for example: create-hotel-booking-agent"
        required: false
        type: string
      target_pr_id:
        description: "Optional PR number whose Microsoft Foundry skill should be evaluated, including fork PRs"
        required: false
        type: string
      requested_by:
        description: "Internal: GitHub login that requested this run through a trusted dispatcher"
        required: false
        type: string

permissions: {}

jobs:
  eval:
    name: Run Microsoft Foundry E2E evals
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Authorize workflow dispatch
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const expectedRepository = 'microsoft/GitHub-Copilot-for-Azure';
            const actualRepository = `${context.repo.owner}/${context.repo.repo}`;
            if (actualRepository !== expectedRepository) {
              throw new Error(`This workflow can only run in ${expectedRepository}; current repository is ${actualRepository}.`);
            }

            const requestedBy = (context.payload.inputs?.requested_by ?? '').trim();
            const targetPrId = (context.payload.inputs?.target_pr_id ?? '').trim();
            const actor = context.actor;
            const isBotDispatch = actor === 'github-actions[bot]';
            if (isBotDispatch && !requestedBy) {
              throw new Error('Bot-dispatched runs must include requested_by.');
            }
            if (isBotDispatch && !targetPrId) {
              throw new Error('Bot-dispatched runs must include target_pr_id.');
            }

            const actorToAuthorize = isBotDispatch ? requestedBy : actor;
            if (!/^[A-Za-z0-9](?:[A-Za-z0-9-]{0,37}[A-Za-z0-9])?$/.test(actorToAuthorize)) {
              throw new Error(`Invalid GitHub login for authorization: ${actorToAuthorize}`);
            }

            const { data: collaboratorPermission } =
              await github.rest.repos.getCollaboratorPermissionLevel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                username: actorToAuthorize,
              });

            const allowedPermissions = new Set(['admin', 'maintain', 'write']);
            const permission = collaboratorPermission.permission;
            if (!allowedPermissions.has(permission)) {
              throw new Error(`${actorToAuthorize} has ${permission} permission; write, maintain, or admin permission is required.`);
            }

            core.info(`Authorized ${actorToAuthorize} with ${permission} permission.`);

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Override Microsoft Foundry skill from target PR head
        if: ${{ inputs.target_pr_id != '' }}
        shell: bash
        env:
          TARGET_PR_ID: ${{ inputs.target_pr_id }}
        run: |
          set -euo pipefail

          if [[ ! "${TARGET_PR_ID}" =~ ^[0-9]+$ ]]; then
            echo "::error::target_pr_id must be a pull request number."
            exit 1
          fi

          pr_head_ref="refs/remotes/origin/target-pr-${TARGET_PR_ID}-head"
          echo "Fetching PR #${TARGET_PR_ID} head from refs/pull/${TARGET_PR_ID}/head."
          git fetch --no-tags --depth=1 origin "+refs/pull/${TARGET_PR_ID}/head:${pr_head_ref}"
          rm -rf plugin/skills/microsoft-foundry
          git restore --source="${pr_head_ref}" --staged --worktree -- plugin/skills/microsoft-foundry

          echo "Using plugin/skills/microsoft-foundry from PR #${TARGET_PR_ID}:"
          git log -1 --oneline "${pr_head_ref}"
          git status --short plugin/skills/microsoft-foundry

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            scripts/package-lock.json
            tests/package-lock.json

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@634ad924cf8baef2257898ba5663be8d19f15aca # v2

      - name: Install azd AI agent extension
        run: azd extension install azure.ai.agents

      - name: Login to Azure using OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.FOUNDRY_E2E_EVAL_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.FOUNDRY_E2E_EVAL_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.FOUNDRY_E2E_EVAL_AZURE_SUBSCRIPTION_ID }}

      - name: Check Azure CLI login
        shell: bash
        run: |
          set -euo pipefail
          current_subscription="$(az account show --query id -o tsv)"
          test "$current_subscription" = "${{ secrets.FOUNDRY_E2E_EVAL_AZURE_SUBSCRIPTION_ID }}"
          az account show --output table

      - name: Configure azd authentication
        shell: bash
        run: |
          set -euo pipefail
          azd config set auth.useAzCliAuth "true"
          azd config set defaults.subscription "${{ secrets.FOUNDRY_E2E_EVAL_AZURE_SUBSCRIPTION_ID }}"

      - name: Install repository dependencies
        run: npm ci

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Build plugin output
        run: npm run build

      - name: Lint Microsoft Foundry E2E eval spec
        run: npx --yes @microsoft/vally-cli@^0.5.0 lint plugin/skills/ --eval-spec evals/microsoft-foundry/e2e-eval.yaml --strict

      - name: Run Microsoft Foundry Vally evals
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          STIMULUS_ID: ${{ inputs.stimulus_id }}
          FOUNDRY_E2E_EVAL_PROJECT_ENDPOINT: ${{ secrets.FOUNDRY_E2E_EVAL_PROJECT_ENDPOINT }}
          FOUNDRY_E2E_EVAL_ARM_RESOURCE: ${{ secrets.FOUNDRY_E2E_EVAL_ARM_RESOURCE }}
          FOUNDRY_E2E_EVAL_DEPLOYMENT_MODEL: ${{ secrets.FOUNDRY_E2E_EVAL_DEPLOYMENT_MODEL }}
          FOUNDRY_E2E_EVAL_ACR: ${{ secrets.FOUNDRY_E2E_EVAL_ACR }}
        run: |
          set -euo pipefail

          tag_args=()
          if [[ -n "${STIMULUS_ID}" ]]; then
            tag_args+=(--tag "id=${STIMULUS_ID}")
          fi

          npx --yes @microsoft/vally-cli@^0.5.0 eval \
            --eval-spec evals/microsoft-foundry/e2e-eval.yaml \
            "${tag_args[@]}" \
            --executor-plugin "${{ github.workspace }}/tests/vally/vally-executor.ts" \
            --output-dir ./results \
            --output jsonl \
            --junit \
            --threshold 0.8

      - name: Upload Vally results
        id: upload-vally-results
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: microsoft-foundry-e2e-eval-results
          path: |
            results/
            tests/reports/
          retention-days: 30

      - name: Show Microsoft Foundry E2E eval results
        if: always()
        shell: bash
        env:
          ARTIFACT_URL: ${{ steps.upload-vally-results.outputs.artifact-url }}
        run: |
          set -euo pipefail

          eval_results_md="$(find ./results -mindepth 2 -maxdepth 2 -type f -name eval-results.md | sort | tail -n 1 || true)"
          if [[ -z "${eval_results_md}" ]]; then
            echo "::error::No eval-results.md found under ./results."
            exit 1
          fi

          echo "Microsoft Foundry E2E eval results: ${eval_results_md}"
          echo
          cat "${eval_results_md}"
          echo

          if [[ -n "${ARTIFACT_URL}" ]]; then
            echo "Vally results artifact: ${ARTIFACT_URL}"
          else
            echo "::warning::Vally results artifact URL is unavailable."
          fi

          {
            echo "## Microsoft Foundry E2E Evaluation Results"
            echo
            cat "${eval_results_md}"
            echo
            echo "## Download"
            echo
            if [[ -n "${ARTIFACT_URL}" ]]; then
              echo "[Download Vally results artifact](${ARTIFACT_URL})"
            else
              echo "Vally results artifact URL is unavailable."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
