name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  eslint:
    name: ESLint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Full history for comparison
      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: tests/package.json

      - name: Install tests dependencies
        working-directory: ./tests
        run: npm ci --ignore-scripts

      - name: Install scripts dependencies
        working-directory: ./scripts
        run: npm ci --ignore-scripts

      - name: Typecheck tests
        working-directory: ./tests
        run: npm run typecheck

      - name: Typecheck scripts
        working-directory: ./scripts
        run: npm run typecheck

      - name: Lint test
        working-directory: ./tests
        run: npm run lint

      - name: Lint scripts
        working-directory: ./scripts
        run: npm run lint

  # Token limit check and comparison for markdown files.
  # The comment is posted by a separate workflow (pr-comment.yml) triggered via workflow_run,
  # so the commenting code always runs from main — not the PR branch.
  token-analysis:
    name: Token Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Full history for comparison

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install scripts dependencies
        working-directory: ./scripts
        run: npm ci --ignore-scripts

      - name: Check Copilot CLI skill char budget
        working-directory: ./scripts
        run: npm run checkCopilotCliCharBudget

      - name: Check changed markdown files
        id: changed-files
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            **/*.md
            **/*.mdx
            .token-limits.json

      - name: Run token limit check
        if: steps.changed-files.outputs.any_changed == 'true'
        id: token-check
        working-directory: ./scripts
        run: |
          LIMIT_OUTPUT=""
          if LIMIT_OUTPUT=$(npm run tokens -- check --markdown 2>&1); then
            echo "$LIMIT_OUTPUT" > ../limit-report.md
            echo "exceeded=false" >> $GITHUB_OUTPUT
          else
            echo "$LIMIT_OUTPUT" > ../limit-report.md
            echo "exceeded=true" >> $GITHUB_OUTPUT
          fi

      - name: Run token comparison
        if: steps.changed-files.outputs.any_changed == 'true'
        id: token-compare
        working-directory: ./scripts
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Validate BASE_REF to avoid unsafe characters in shell command
          if ! echo "$BASE_REF" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._/-]*$'; then
            echo "Error: Invalid base ref: '$BASE_REF'. Aborting token comparison."
            exit 1
          fi

          COMPARE_OUTPUT=$(npm run tokens -- compare --base "origin/${BASE_REF}" --head HEAD --markdown 2>&1)
          echo "$COMPARE_OUTPUT" > ../compare-report.md
          
          TOTAL_DIFF=$(echo "$COMPARE_OUTPUT" | grep -oP 'Total Change.*?\*\*\K[^*]+' | head -1 || echo "0 tokens")
          echo "diff=$TOTAL_DIFF" >> $GITHUB_OUTPUT

      - name: Generate combined report
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          # Combine reports
          echo "# 🔍 Token Analysis Report" > combined-report.md
          echo "" >> combined-report.md

          # Add comparison report first
          if [ -f compare-report.md ]; then
            cat compare-report.md >> combined-report.md
            echo "" >> combined-report.md
          fi

          # Add limit check report
          if [ -f limit-report.md ]; then
            cat limit-report.md >> combined-report.md
          fi

          # Add to step summary
          cat combined-report.md >> $GITHUB_STEP_SUMMARY

      - name: Upload report artifact
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: token-analysis-report
          path: combined-report.md
          retention-days: 1

      - name: Skip message
        if: steps.changed-files.outputs.any_changed != 'true'
        run: echo "No markdown files changed - skipping token analysis"

  # Validate skill structure
  skill-validation:
    name: Skill Structure
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - name: Check changed skill files
        id: changed-skills
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            plugin/skills/*/SKILL.md
            .github/skills/*/SKILL.md

      - name: Check all changed plugin skill files
        id: changed-plugin-skills
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            plugin/skills/**
            .github/skills/**

      - name: Setup Node.js
        if: steps.changed-skills.outputs.any_changed == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install scripts dependencies
        if: steps.changed-skills.outputs.any_changed == 'true'
        working-directory: ./scripts
        run: npm ci --ignore-scripts

      - name: Validate skill frontmatter
        if: steps.changed-skills.outputs.any_changed == 'true'
        working-directory: ./scripts
        env:
          CHANGED_FILES: ${{ steps.changed-skills.outputs.all_changed_files }}
        run: |
          echo "## Skill Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Pass changed SKILL.md file paths directly to the validator
          # Prefix with ../ since working-directory is ./scripts
          SKILL_FILES=""
          for file in $CHANGED_FILES; do
            SKILL_FILES="$SKILL_FILES ../$file"
          done
          
          # Run frontmatter spec validation
          if OUTPUT=$(npm run frontmatter -- $SKILL_FILES 2>&1); then
            echo "$OUTPUT"
            echo "✅ All skill frontmatter is valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "$OUTPUT"
            echo "❌ Frontmatter validation failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Validate skills.json
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Get all skill directories
            const skillsDir = 'plugin/skills';
            const skillDirs = fs.readdirSync(skillsDir)
                .filter(f => fs.statSync(path.join(skillsDir, f)).isDirectory())
                .sort();

            // Read skills.json
            const skillsJson = JSON.parse(fs.readFileSync('tests/skills.json', 'utf8'));
            const jsonSkills = [...skillsJson.skills].sort();

            let hasError = false;

            // 1. skills.json enumerates all skills 
            const skillDirsStr = JSON.stringify(skillDirs);
            const jsonSkillsStr = JSON.stringify(jsonSkills);
            if (skillDirsStr !== jsonSkillsStr) {
                console.log();
                console.log("skills in skills.json doesn't match available skills in plugin/skills/");
                hasError = true;
            }

            // 2. Integration test schedule coverages all skills
            let scheduledSkills = [];
            Object.values(skillsJson.integrationTestSchedule).forEach(value => {
                if (value) {
                    value.split(',').forEach(s => scheduledSkills.push(s));
                }
            });

            scheduledSkills = scheduledSkills.sort();

            const scheduledSkillsStr = JSON.stringify(scheduledSkills);
            if (skillDirsStr !== scheduledSkillsStr) {
                console.log("skillDirs", JSON.stringify(skillDirs));
                console.log("scheduledSkills", JSON.stringify(scheduledSkills));
                console.log("integrationTestSchedule in skills.json doesn't match available skills in plugin/skills/");
                hasError = true;
            }

            if (hasError) {
                core.setFailed('tests/skills.json validation failed');
            }

      - name: Check skill version bumps
        if: steps.changed-plugin-skills.outputs.any_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.changed-plugin-skills.outputs.all_changed_files }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          echo "## Skill Version Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=false

          # Validate BASE_REF to avoid unsafe characters in shell command
          if ! echo "$BASE_REF" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._/-]*$'; then
            echo "Error: Invalid base ref: '$BASE_REF'. Aborting skill version check."
            exit 1
          fi

          # For each changed file, map to the top-level SKILL.md (one level under plugin/skills or .github/skills).
          # This ensures that deeply nested files (e.g. plugin/skills/foo/references/bar/SKILL.md)
          # always resolve to the skill root (e.g. plugin/skills/foo/SKILL.md) rather than
          # an intermediate SKILL.md found by walking up the directory tree.
          SKILL_FILES=""
          for file in $CHANGED_FILES; do
            skill_dir=""
            # Extract the first path segment after the skills/ prefix — this is the skill root dir.
            # e.g. "plugin/skills/microsoft-foundry/references/deep/file.md" → "plugin/skills/microsoft-foundry"
            if echo "$file" | grep -qE '^plugin/skills/[^/]+/'; then
              skill_dir=$(echo "$file" | sed 's|^\(plugin/skills/[^/]*\)/.*|\1|')
            elif echo "$file" | grep -qE '^\.github/skills/[^/]+/'; then
              skill_dir=$(echo "$file" | sed 's|^\(\.github/skills/[^/]*\)/.*|\1|')
            fi
            # Only include if the skill root actually contains a SKILL.md
            if [ -n "$skill_dir" ] && [ -f "$skill_dir/SKILL.md" ]; then
              SKILL_FILES="$SKILL_FILES $skill_dir/SKILL.md"
            fi
          done

          # Deduplicate
          SKILL_FILES=$(echo "$SKILL_FILES" | tr ' ' '\n' | sort -u | grep -v '^$')

          if [ -z "$SKILL_FILES" ]; then
            echo "No SKILL.md files affected by changes."
            echo "✅ No version bump needed" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi

          for skill_file in $SKILL_FILES; do
            SKILL_NAME=$(basename "$(dirname "$skill_file")")

            # Get version in base branch (use [[:space:]] for portable whitespace matching)
            BASE_VERSION=$(git show "origin/${BASE_REF}:${skill_file}" 2>/dev/null | sed -n '/^---$/,/^---$/p' | grep -E '^[[:space:]]+version:' | head -1 | sed 's/.*version:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}/\1/' || echo "")

            # Get version in PR branch
            HEAD_VERSION=$(sed -n '/^---$/,/^---$/p' "$skill_file" | grep -E '^[[:space:]]+version:' | head -1 | sed 's/.*version:[[:space:]]*"\{0,1\}\([^"]*\)"\{0,1\}/\1/')

            # New skill (no base version) — skip, it starts at 1.0.0
            if [ -z "$BASE_VERSION" ]; then
              echo "✅ $skill_file — new skill (version: $HEAD_VERSION)"
              continue
            fi

            if [ "$BASE_VERSION" = "$HEAD_VERSION" ]; then
              echo "::error file=$skill_file::Skill '$SKILL_NAME' was modified but metadata.version was not bumped ($BASE_VERSION). Bump the version in your PR."
              echo "❌ \`$SKILL_NAME\` (\`$skill_file\`) — version not bumped ($BASE_VERSION)" >> $GITHUB_STEP_SUMMARY
              FAILED=true
            else
              echo "✅ $skill_file — $SKILL_NAME version bumped: $BASE_VERSION → $HEAD_VERSION"
              echo "✅ \`$SKILL_NAME\` (\`$skill_file\`) — $BASE_VERSION → $HEAD_VERSION" >> $GITHUB_STEP_SUMMARY
            fi
          done

          if [ "$FAILED" = true ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> Every PR that modifies a skill must bump its \`metadata.version\` in the same PR." >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Skip message
        if: steps.changed-skills.outputs.any_changed != 'true'
        run: echo "No skill files changed - skipping validation"

  # Validate markdown references
  reference-check:
    name: Markdown References
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check changed skill markdown files
        id: changed-markdown
        uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323 # v47.0.5
        with:
          files: |
            plugin/skills/**/*.md
            .github/skills/**/*.md

      - name: Setup Node.js
        if: steps.changed-markdown.outputs.any_changed == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install scripts dependencies
        if: steps.changed-markdown.outputs.any_changed == 'true'
        working-directory: ./scripts
        run: npm ci --ignore-scripts

      - name: Validate markdown references
        if: steps.changed-markdown.outputs.any_changed == 'true'
        working-directory: ./scripts
        run: |
          echo "## Markdown Reference Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Run reference check and capture output
          if OUTPUT=$(npm run references 2>&1); then
            echo "$OUTPUT"
            echo "✅ All markdown references are valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "$OUTPUT"
            echo "❌ Found broken or escaped markdown references" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Skip message
        if: steps.changed-markdown.outputs.any_changed != 'true'
        run: echo "No skill markdown files changed - skipping reference check"
