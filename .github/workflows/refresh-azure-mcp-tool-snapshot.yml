name: Refresh Azure MCP Tool Snapshot

on:
  workflow_dispatch:
  schedule:
    - cron: '17 4 * * *'

concurrency:
  group: refresh-azure-mcp-tool-snapshot
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-snapshot:
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: automation/refresh-azure-mcp-tool-snapshot
      SNAPSHOT_PATH: tests/fixtures/azure-mcp-tool-names.snapshot.json

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: '24'

      - name: Update Azure MCP tool snapshot
        working-directory: tests
        run: npm run update:mcp-tool-snapshot
        env:
          AZURE_MCP_TELEMETRY_OPTOUT: "true"
          DOTNET_CLI_TELEMETRY_OPTOUT: "true"
          AZURE_CORE_COLLECT_TELEMETRY: "0"

      - name: Commit and push snapshot changes
        id: commit_changes
        run: |
          if git diff --quiet -- "$SNAPSHOT_PATH"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git checkout -B "$BRANCH_NAME"
          git add "$SNAPSHOT_PATH"
          git commit -m "chore: refresh Azure MCP tool snapshot"
          git push --force origin "HEAD:$BRANCH_NAME"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Create or update pull request
        if: steps.commit_changes.outputs.changed == 'true'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { owner, repo } = context.repo;
            const branch = process.env.BRANCH_NAME;
            const head = `${owner}:${branch}`;
            const title = 'chore: refresh Azure MCP tool snapshot';
            const body = [
              '## Summary',
              '- Refreshes `tests/fixtures/azure-mcp-tool-names.snapshot.json` using the latest `@azure/mcp` CLI tool list.',
              '- Generated by the scheduled `Refresh Azure MCP Tool Snapshot` workflow.',
            ].join('\n');

            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              head,
              base: 'main',
              per_page: 1,
            });

            if (existing.data.length > 0) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existing.data[0].number,
                title,
                body,
              });
              core.info(`Updated existing PR #${existing.data[0].number}`);
              return;
            }

            const pr = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head: branch,
              base: 'main',
              body,
            });

            core.info(`Created PR #${pr.data.number}`);
