name: azure-enterprise-infra-planner-eval-plan-aks-microservices
description: |
  AKS microservices e-commerce platform.
version: "1.0"
type: capability

environment:
  skills:
    - "../../../plugin/skills/azure-enterprise-infra-planner"
  files:
    - src: "fixtures/package.json"
      dest: "package.json"
    - src: "fixtures/index.js"
      dest: "index.js"

config:
  runs: 1
  timeout: 600
  executor: copilot-sdk
  model: claude-sonnet-4.6

stimuli:
  - name: plan-aks-microservices
    prompt: >
      We're migrating our e-commerce platform to Azure. It consists of 5
      microservices: product catalog, order management, user authentication,
      payment processing, and notifications. We want to deploy on AKS with
      proper networking, monitoring, and a managed database. Plan the Azure
      infrastructure for this system. Assume all defaults to create the
      preliminary resource list, then approve the preliminary list and proceed
      to plan generation.
    constraints:
      max_duration_ms: 600000
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-enterprise-infra-planner

  - name: trigger-should-aks-microservices
    prompt: "Provision microservices on AKS with proper networking"
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-enterprise-infra-planner
