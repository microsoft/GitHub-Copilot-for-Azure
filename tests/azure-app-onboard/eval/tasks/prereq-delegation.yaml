# Task: Verify orchestrator delegates to azure-app-onboard-prereq skill
id: prereq-delegation
name: "[prereq] — Orchestrator delegates to prereq skill"
description: |
  With bya-simple-web-app cloned, verifies the orchestrator reads
  azure-app-onboard-prereq/SKILL.md, scans the workspace via the prereq workflow,
  and produces a readiness verdict. Does NOT test prereq content quality
  (that belongs in the azure-app-onboard-prereq standalone eval suite).

tags:
  - workflow
  - step-3
  - prereq
  - delegation

inputs:
  repo_id: bya-simple-web-app
  prompt: "I want to bring my app to Azure. Can you scan my code and tell me what I need?"
  context:
    session_state: new
    workspace: repo

expected:
  outcomes:
    - type: task_completed
  output_not_contains:
    - "(?i)fatal error|unhandled exception"
  behavior:
    max_tool_calls: 25

graders:
  - name: reads_prereq_skill
    type: tool
    config:
      tool_name: "view|skill"
      min_calls: 1

  - name: scans_workspace
    type: tool
    config:
      tool_name: "view|glob|powershell"
      min_calls: 1

  - name: provides_readiness_verdict
    type: text
    config:
      regex_match:
        - "(?i)ready|not.+ready|readiness|verdict|assessment|evaluation|evaluate|report|blocker|fail|warn|pass"

  - name: does_not_skip_to_architecture
    type: text
    config:
      regex_not_match:
        - "(?i)here('s| is) (the|your) (full )?architecture|I('ve| have) planned|skipping (the )?(scan|prereq)"
