# Task: Detect existing infra in an AI agent project
id: ai-agent-deploy
name: "[Repo Context] — AI agent project with existing infra"
description: |
  With get-started-with-ai-agents cloned into the workspace, verifies the agent
  detects existing azure.yaml + Bicep infra and offers a handoff/reuse decision
  rather than re-planning from scratch. This repo is already Azure-ready.

tags:
  - repo-context
  - ai
  - has-infra
  - infra-handoff-test

inputs:
  repo_id: get-started-ai-agents
  prompt: "I have an existing app — what's the best way to migrate it to Azure?"
  context:
    session_state: new
    workspace: repo

expected:
  outcomes:
    - type: task_completed
  output_not_contains:
    - "(?i)fatal error|unhandled exception"
  behavior:
    max_tool_calls: 30

graders:
  - name: detects_existing_infra
    type: text
    config:
      # Agent must recognize the repo already has Azure infrastructure
      regex_match:
        - "(?i)(azure\\.yaml|bicep|infra|already.{0,20}(configured|prepared|ready|set.?up|has)|existing.{0,20}(infra|infrastructure|deployment|config)|azd)"

  - name: understands_repo_content
    type: text
    config:
      # Agent identifies AI/Foundry components
      regex_match:
        - "(?i)(openai|gpt|azure.?ai|foundry|python|fastapi|typescript|react|frontend|container apps)"

  - name: offers_handoff_or_reuse
    type: text
    config:
      # Agent offers to deploy with existing infra OR asks whether to reuse/re-architect
      regex_match:
        - "(?i)(azd up|deploy.{0,20}existing|reuse|use.{0,20}(existing|current)|already.{0,20}(ready|prepared)|proceed.{0,20}deploy|shall|would you|run.{0,20}(azd|deployment))"

  - name: scans_repo
    type: tool
    config:
      tool_name: "view|glob|powershell"
      min_calls: 1
