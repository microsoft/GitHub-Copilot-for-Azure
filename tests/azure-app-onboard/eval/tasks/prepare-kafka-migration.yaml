# Task: Map Kafka + Java/Gradle stack to Azure equivalents
id: prepare-kafka-migration
name: "[prepare] — Java/Gradle + Kafka → Event Hubs migration mapping"
description: |
  With postgresql-event-sourcing (Spring Boot + PostgreSQL + Kafka + nginx via
  Docker Compose) cloned into the workspace, verifies the agent detects
  Java/Gradle build tooling (not npm/pip), maps Kafka to Azure Event Hubs
  (Kafka protocol), and recognizes the nginx reverse proxy in compose.
  Unique signal: non-JS/Python build system detection + messaging migration.

tags:
  - prepare
  - kafka
  - messaging-migration
  - java
  - no-azure-infra

inputs:
  repo_id: postgresql-event-sourcing
  prompt: "I just signed up for Azure. What's the fastest way to bring my app over?"
  context:
    session_state: new
    workspace: repo

expected:
  outcomes:
    - type: task_completed
  output_not_contains:
    - "(?i)fatal error|unhandled exception"
  behavior:
    max_tool_calls: 25

graders:
  - name: detects_gradle_build
    type: text
    config:
      # Must detect Java/Gradle stack (not npm/pip) — tests non-JS/Python build system recognition
      regex_match:
        - "(?i)(gradle|build\\.gradle|gradlew|jib|java.{0,20}(build|compile)|spring.?boot|java.{0,5}\\d+)"

  - name: maps_kafka_to_event_hubs
    type: text
    config:
      # Must specifically recommend Event Hubs OR identify Kafka as a service to migrate
      regex_match:
        - "(?i)(event.?hubs|event hubs.{0,30}kafka|kafka.{0,30}event.?hubs|kafka.{0,20}protocol|kafka.{0,20}compatible|kafka.{0,30}(azure|migrate|replace|map)|integration.?event|outbox)"

  - name: detects_postgres_dependency
    type: text
    config:
      regex_match:
        - "(?i)(postgres|postgresql|event.?store|database)"

  - name: detects_docker_compose_services
    type: text
    config:
      # Must mention docker-compose or identify nginx/multi-service setup
      regex_match:
        - "(?i)(docker.?compose|nginx|reverse.?proxy|multiple.{0,20}(service|container)|compose)"

  - name: scans_repo
    type: tool
    config:
      tool_name: "view|glob|powershell"
      min_calls: 1
