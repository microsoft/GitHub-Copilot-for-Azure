# Task: Pure business intent with no code — tests intent questioning
id: greenfield-no-code
name: "[orchestrator] — Greenfield intent with no workspace code"
description: |
  No repo cloned — empty workspace. The prompt provides a detailed app spec
  (backend, frontend, DB, auth). Verifies the orchestrator proceeds to
  architecture planning from intent alone, doesn't ask questions already
  answered in the prompt, and mentions appropriate Azure services.
  Unique signal: no workspace files to scan — pure intent-to-architecture.

tags:
  - orchestrator
  - entry
  - greenfield
  - no-code
  - business-intent

inputs:
  prompt: >
    I have no code yet — help me get started on Azure. I'm building a dashboard
    for our sales team, maybe 200 users. We'll need a database and some kind of
    login for our company. What Azure services do I need and what will it cost?
  context:
    session_state: new
    workspace: empty

expected:
  outcomes:
    - type: task_completed
  output_not_contains:
    - "(?i)fatal error|unhandled exception"
  behavior:
    max_tool_calls: 10

graders:
  - name: does_not_ask_answered_questions
    type: text
    config:
      # Must NOT re-ask about user count or login/auth — those are in the prompt
      regex_not_match:
        - "(?i)how many users|how many people|what (kind|type) of (login|auth)"

  - name: mentions_auth_service
    type: text
    config:
      # Must address the company login requirement
      regex_match:
        - "(?i)(entra|azure.?ad|active.?directory|sso|oidc|oauth|identity|authentication|microsoft.?identity|login|sign.?in)"

  - name: mentions_multiple_azure_services
    type: text
    config:
      # Must mention at least 2 distinct Azure services (hosting + DB minimum)
      regex_match:
        - "(?i)(container apps|app service|azure functions|static web apps|azure sql|cosmos|postgresql|database)"
        - "(?i)(postgres|azure.?database|cosmos|sql)"

  - name: drives_toward_planning
    type: text
    config:
      regex_match:
        - "(?i)(architect|plan|recommend|suggest|service|tier|sku|cost|deploy|host|provision|shall|would you|proceed)"
