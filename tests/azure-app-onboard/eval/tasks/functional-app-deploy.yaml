# Task: Deploy a functional web app to Azure with guided onboarding
# Merged from: deploy-functional-app.yaml + guided-onboarding.yaml
id: functional-app-deploy
name: "[Repo Context] — Functional app deploy with guided onboarding"
description: |
  With bya-simple-web-app cloned, verifies the orchestrator guides a beginner
  through session creation, code scanning, deployment planning with services
  and cost estimation, and presents an approval gate.

tags:
  - repo-context
  - deploy
  - functional
  - onboarding

inputs:
  repo_id: bya-simple-web-app
  prompt: "Can you walk me through getting my first app on Azure?"
  context:
    session_state: new
    workspace: repo

expected:
  outcomes:
    - type: task_completed
  output_not_contains:
    - "(?i)fatal error|unhandled exception"
  behavior:
    max_tool_calls: 25

graders:
  - name: detects_express_framework
    type: text
    config:
      regex_match:
        - "(?i)(express|node\\.?js|javascript|npm|package\\.json)"

  - name: recommends_hosting_service
    type: text
    config:
      regex_match:
        - "(?i)(App Service|Container Apps|Azure Functions|Web App|deploy.{0,20}Azure|host.{0,20}Azure|Azure.{0,20}(host|deploy|run|service))"

  - name: discusses_cost_or_budget
    type: text
    config:
      # Accept cost estimate OR budget question — both are valid single-turn behaviors
      regex_match:
        - "(?i)(cost|pric|\\$[0-9]|free|per.?month|monthly|estimat|budget|cheapest|tier|how much)"

  - name: detects_db_or_auth
    type: text
    config:
      regex_match:
        - "(?i)sqlite|better-sqlite|database|session|auth|bcrypt|login"

  - name: explains_steps
    type: text
    config:
      regex_match:
        - "(?i)step|first.+then|walk.+through|here.{0,5}(what|how)|let me|I.{0,5}(will|ll)|plan|phase|next"

  - name: scans_repo
    type: tool
    config:
      tool_name: "view|glob|powershell"
      min_calls: 1

  # shows_approval_gate removed — 15% flaky in single-turn waza.
  # Agent correctly asks scale/tier questions for onboarding flow.
  # Replaced with: validates agent drives toward planning (question or gate).
  - name: drives_toward_planning
    type: text
    config:
      regex_match:
        - "(?i)proceed|continue|go ahead|shall (i|we)|ready to|would you like|scale|tier|how many|traffic|free.?(tier|plan)|F1|B1|plan|architect|next step"

  - name: writes_quick_probe_artifact
    type: tool
    config:
      # Pass 1 must persist probe results to context.json (quickProbe field)
      tool_name: create
      argument_match:
        path: "(?i)context\\.json"

  - name: probe_stays_shallow
    type: tool
    config:
      # Quick probe should read a bounded number of files (not a full scan)
      tool_name: "view|read_file|glob"
      max_calls: 12
