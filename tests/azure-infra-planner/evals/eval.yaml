name: azure-infra-planner-eval
description: Evaluation suite for the azure-infra-planner skill - validates infrastructure planning from workload descriptions and correct anti-trigger behavior
skill: azure-infra-planner
version: "1.0"
config:
  trials_per_task: 1
  timeout_seconds: 300
  parallel: false
  executor: copilot-sdk
  model: claude-opus-4.6
  skill_directories:
    - "../../../plugin/skills/azure-infra-planner"
  mcp_servers:
    azure:
      type: stdio
      command: npx
      args: ["-y", "@azure/mcp@latest", "server", "start"]
graders:
  - type: text
    name: no_fatal_errors
    config:
      regex_not_match:
        - "(?i)fatal\\s+error|unhandled\\s+exception|panic:"
  - type: prompt
    name: response_quality
    config:
      model: claude-opus-4.6
      continue_session: true
      prompt: |
        You are evaluating an AI agent that has the azure-infra-planner skill. Review the original user prompt and the agent's response.

        First, classify the user request:
        - PLAN REQUEST: The user wants to plan or architect NEW multi-service Azure infrastructure from a workload description
        - ANTI-TRIGGER: The user wants to prepare an existing codebase for Azure, add features to an existing app, or execute azd up

        Then evaluate:

        For PLAN REQUESTS, check ALL of these:
        1. The agent follows a plan-first workflow (research requirements before generating IaC)
        2. The agent proposes creating an infrastructure-plan.json file at .azure/infrastructure-plan.json
        3. The agent identifies appropriate Azure resources and services for the described workload
        4. The agent presents or acknowledges the plan before generating IaC (approval may be automatic if the user requested it)
        5. The agent generates or offers to generate Bicep or Terraform as the IaC format

        If all 5 criteria are met, call set_waza_grade_pass with description "plan_request_correct" and a reason summarizing what was done well.
        If any criterion is not met, call set_waza_grade_fail with description "plan_request_incorrect" and explain which criteria failed.

        For ANTI-TRIGGER requests, check:
        1. The agent does NOT attempt to create a new multi-service infrastructure plan
        2. The agent redirects to a more appropriate skill or workflow (e.g., azure-prepare for existing apps, azure-deploy for running azd up)

        If both criteria are met, call set_waza_grade_pass with description "anti_trigger_correct" and a reason.
        If either criterion is not met, call set_waza_grade_fail with description "anti_trigger_incorrect" and explain why.
  - type: prompt
    name: plan_quality
    config:
      model: claude-opus-4.6
      continue_session: true
      prompt: |
        You are evaluating the quality of an infrastructure plan generated by the azure-infra-planner skill.

        First, classify the user request:
        - PLAN REQUEST: The user wants to plan or architect NEW multi-service Azure infrastructure
        - ANTI-TRIGGER: The user wants to prepare an existing codebase, add features to an existing app, or execute azd up

        If ANTI-TRIGGER, call set_waza_grade_pass with description "plan_quality_skipped" and reason "Anti-trigger task — no plan to evaluate."

        If PLAN REQUEST, read the file `.azure/infrastructure-plan.json` from the workspace.
        If the file does not exist or is unparseable JSON, call set_waza_grade_fail with description "plan_quality_missing" and reason explaining the file is missing or invalid.

        If the plan JSON exists and is valid, evaluate it against these four dimensions:

        ### 1. Goal Alignment (weight: 0.30)
        How well does the plan address the stated `inputs.userGoal`?
        - Are all services required by the goal represented in `plan.resources[]`?
        - Does `plan.overallReasoning` explain how the architecture satisfies the goal?
        - Are there resources that appear unrelated to the goal?

        ### 2. Well-Architected Framework Conformance (weight: 0.25)
        Does the plan follow Azure WAF principles where relevant?
        - Reliability — Redundancy, availability zones, failover
        - Security — Network isolation, managed identity, Key Vault usage
        - Cost Optimization — Appropriate SKU tiers, no over-provisioning
        - Operational Excellence — Monitoring, diagnostics, tagging
        - Performance Efficiency — Correct SKU sizing for workload
        Do not require all five pillars for every plan. Score based on what is relevant to the stated goal.

        ### 3. Dependency Completeness (weight: 0.25)
        Are resource dependencies internally consistent?
        - Every `dependencies[]` entry references an existing resource in the plan
        - No circular dependencies
        - Implicit dependencies are explicit (e.g., App Service → App Service Plan)
        - Resources that require a parent exist (e.g., SQL DB → SQL Server)

        ### 4. Deployment Viability (weight: 0.20)
        Will the included properties cause deployment failures?
        - SKU compatibility between paired resources
        - Subnet conflicts
        - Storage kind compatibility
        - CIDR overlap detection
        Only evaluate properties that ARE present. Do not penalize for missing properties.

        ## Scoring Rules
        - Treat placeholder values and IDs as correctly configured; do not penalize them
        - Do not penalize for missing or incomplete properties — only evaluate what is present
        - Ignore naming conventions, type formatting, or N/A values
        - Score each dimension 0.0–1.0, then compute overallScore as the weighted average

        Pass threshold: overallScore >= 0.7

        If overallScore >= 0.7, call set_waza_grade_pass with description "plan_quality_pass" and a reason summarizing per-dimension scores and strengths.
        If overallScore < 0.7, call set_waza_grade_fail with description "plan_quality_fail" and a reason summarizing per-dimension scores and weaknesses.
  - type: behavior
    name: efficiency_bounds
    config:
      max_tool_calls: 50
      max_duration_ms: 600000
metrics:
  - name: task_completion
    weight: 1.0
    threshold: 0.7
tasks:
  - "tasks/*.yaml"
