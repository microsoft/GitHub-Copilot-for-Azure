# Task: Evaluate repo completeness for deployment
id: evaluate-completeness
name: "[Repo Context] — Evaluate repo completeness"
description: |
  With wetty (terminal-in-browser) cloned into the workspace, verifies the agent
  checks for entry points, dependencies, and configuration needed for
  Azure deployment. This repo has package.json, Dockerfile, docker-compose,
  and WebSocket config — testing all completeness axes.

tags:
  - repo-context
  - evaluate
  - completeness

inputs:
  repo_id: wetty
  prompt: |
    What do I need before I can deploy to Azure?
  context:
    session_state: new
    workspace: repo

expected:
  outcomes:
    - type: task_completed
  output_not_contains:
    - "(?i)fatal error|unhandled exception"
  behavior:
    max_tool_calls: 15

graders:
  - name: checks_entry_point
    type: text
    config:
      regex_match:
        - "(?i)entry.?point|index|main|start"

  - name: checks_dependencies
    type: text
    config:
      regex_match:
        - "(?i)depend|package|module|npm|pip"

  - name: checks_config
    type: text
    config:
      regex_match:
        - "(?i)config|environment|env|port|setting"
