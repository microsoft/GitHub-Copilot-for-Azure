# Task: Evaluate multi-component monorepo structure
id: evaluate-monorepo
name: "[Repo Context] — Evaluate monorepo with multiple components"
description: |
  With fullstack-starter cloned (Next.js + FastAPI + Flutter + PostgreSQL +
  Redis, 4 components), verifies the agent detects all components, handles
  monorepo structure, and identifies which components are deployable to Azure
  vs not (Flutter mobile should be excluded).

tags:
  - repo-context
  - evaluate
  - monorepo
  - multi-component

inputs:
  repo_id: fullstack-starter
  prompt: |
    Can you scan my repo and tell me if there are any blockers for deployment?
    Save the evaluation to a session so I can review it later.
  context:
    session_state: new
    workspace: repo

expected:
  outcomes:
    - type: task_completed
  # No output_not_contains — prereq evaluation SHOULD discuss potential errors
  # (e.g. "missing entry point would cause a fatal error on startup").
  # The has_output code grader catches actual agent crashes.
  behavior:
    max_tool_calls: 50

graders:
  - name: detects_monorepo_structure
    type: text
    config:
      regex_match:
        - "(?i)mono.?repo|components|multiple.?(component|service|app|project)|[3-9].{1,10}(component|service|app|project|module)|(three|four|five|six|seven).{0,15}(component|service|app|project)|apps/.{0,30}apps/|workspace|apps/api.{0,80}apps/w(eb|orker)|apps/"

  - name: identifies_key_components
    type: text
    config:
      regex_match:
        - "(?i)(next\\.?js|react|frontend|fast.?api|python|backend|worker)"
        - "(?i)(postgres|redis|flutter|mobile|database|cache|google.?cloud|GCP|Service.?Bus|Queue|pub.?sub|task|Event.?Grid|migrate|infrastructure)"

  - name: identifies_flutter_not_deployed
    type: text
    config:
      regex_match:
        - "(?i)flutter.+(not|skip|exclud|mobile|can't|won't|separately|firebase|app.?distribution|what|scope|which|advisory|gcp|warn|N/?A)|mobile.+(not|skip|exclud|separately|client|firebase|advisory|gcp|N/?A)|not.+deploy.+flutter|flutter.{0,50}\\?|flutter.{0,20}\\d|apps/mobile.{0,30}N/?A|blocker.{0,200}apps/api|ready.+deploy.{0,80}apps/api|GCP.+migrat|google.?cloud.+migrat|azure.?cloud.?migrat|Service.?Bus|Queue.?Storage"

  - name: scans_repo
    type: tool
    config:
      tool_name: "view|glob|powershell"
      min_calls: 1

  - name: writes_session_artifacts
    type: tool
    config:
      # SKILL.md Step 1 (create context.json) + Step 4 (write prereq-output.json)
      # Direct entry must create session artifacts, not just answer verbally
      tool_name: create
      argument_match:
        path: "(?i)(context\\.json|prereq.?output\\.json)"
