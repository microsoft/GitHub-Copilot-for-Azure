# Task: Evaluate a broken web app for Azure readiness
id: evaluate-broken-app
name: "[Repo Context] — Evaluate broken web app"
description: |
  With bya-broken-web-app cloned into the workspace, verifies the agent
  identifies build issues and suggests fixes before deployment.

tags:
  - repo-context
  - evaluate
  - broken

inputs:
  repo_id: bya-broken-web-app
  prompt: |
    Can you scan my repo and tell me if there are any blockers for deployment?
  context:
    session_state: new
    workspace: repo

expected:
  outcomes:
    - type: task_completed
  output_not_contains:
    - "(?i)fatal error|unhandled exception"
  behavior:
    max_tool_calls: 15

graders:
  - name: identifies_build_issues
    type: text
    config:
      regex_match:
        - "(?i)(issue|problem|error|warning|broken|fail|concern|missing|incomplete|blocker|sqlite|db\\.js|style\\.css)"

  - name: suggests_remediation
    type: text
    config:
      regex_match:
        - "(?i)fix|add|create|update|repair|restore|resolve|address|correct|need|should|before.{0,20}deploy|recommend|suggest|option|generate|scaffold|unblock|missing.{0,30}(file|module|dep)"

  - name: does_not_blindly_approve
    type: text
    config:
      regex_not_match:
        - "(?i)here('s| is) (the|your) (full )?architecture plan|everything looks good|no issues found"

  - name: scans_repo
    type: tool
    config:
      tool_name: "view|glob|powershell"
      min_calls: 1
