# Task: Evaluate Azure service deployability
id: evaluate-deployability
name: "[Repo Context] — Evaluate Azure deployability"
description: |
  With bya-simple-web-app cloned into the workspace, verifies the agent
  maps the app to appropriate Azure services and assesses deployment
  feasibility.

tags:
  - repo-context
  - evaluate
  - deployability

inputs:
  repo_id: bya-simple-web-app
  prompt: |
    Check if my app is ready to deploy to Azure
  context:
    session_state: new
    workspace: repo

expected:
  outcomes:
    - type: task_completed
  output_not_contains:
    - "(?i)fatal error|unhandled exception"
  behavior:
    max_tool_calls: 15

graders:
  - name: maps_to_azure_services
    type: text
    config:
      regex_match:
        - "(?i)app service|container|static web|function|web app|hosting|PaaS|azure sql|cosmos|managed.{0,5}(db|database)|consumption|free tier"

  - name: assesses_feasibility
    type: text
    config:
      regex_match:
        - "(?i)feasib|viable|recipe|deploy|compatible"
