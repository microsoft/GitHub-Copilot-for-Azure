# Task: Evaluate a functional web app for Azure readiness
id: evaluate-functional-app
name: "[Repo Context] — Evaluate functional web app"
description: |
  With bya-simple-web-app cloned into the workspace, verifies the agent
  detects the app's tech stack, confirms build health, and produces a
  readiness assessment for Azure deployment.

tags:
  - repo-context
  - evaluate
  - functional

inputs:
  repo_id: bya-simple-web-app
  prompt: |
    What prerequisites does my project need to meet for Azure deployment?
    Save the evaluation to a session so I can review it later.
  context:
    session_state: new
    workspace: repo

expected:
  outcomes:
    - type: task_completed
  output_not_contains:
    - "(?i)fatal error|unhandled exception"
  behavior:
    max_tool_calls: 50

graders:
  - name: detects_tech_stack
    type: text
    config:
      regex_match:
        - "(?i)(express|node\\.?js|javascript.?(app|server|api)|npm|web.?(app|server)|package\\.json)"

  - name: evaluates_dockerfile_presence
    type: text
    config:
      regex_match:
        - "(?i)dockerfile|docker|container|runtime.?stack|built.?in.?runtime|app.?service|F1|free.?tier|direct.?deploy|compile|compilation|deploy.+Azure|Azure.+deploy|native.+module|prebuild|tier|SKU|oryx|startup"

  - name: provides_readiness_verdict
    type: text
    config:
      regex_match:
        - "(?i)ready|not.+ready|readiness|verdict|assessment|recommendation|evaluation|evaluate|report|blocker|fail|warn|pass"

  - name: does_not_skip_to_architecture
    type: text
    config:
      regex_not_match:
        - "(?i)here('s| is) (the|your) (full )?architecture|I('ve| have) planned|skipping (the )?(scan|prereq)"

  - name: scans_repo
    type: tool
    config:
      tool_name: "view|glob|powershell"
      min_calls: 1

  - name: writes_session_artifacts
    type: tool
    config:
      # SKILL.md Step 1 (create context.json) + Step 4 (write prereq-output.json)
      # Direct entry must create session artifacts, not just answer verbally
      tool_name: create
      argument_match:
        path: "(?i)(context\\.json|prereq.?output\\.json)"
