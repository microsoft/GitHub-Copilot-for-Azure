# Waza eval specification for azure-app-onboard-prereq skill
# Body quality evaluation — validates prereq scanning produces correct assessment.
name: azure-app-onboard-prereq-eval
description: |
  Evaluation suite for the azure-app-onboard-prereq skill.
  Tests that body instructions guide the agent through prereq evaluation:
  - Build health assessment (compile, lint, test pass)
  - Repo completeness check (entry point, dependencies, config)
  - Azure deployability assessment (service mapping, feasibility)
  Measures whether the agent correctly identifies blockers, gaps, and
  readiness signals before the prepare phase begins.

skill: azure-app-onboard-prereq
expected_skill: azure-app-onboard-prereq
version: "1.0"

config:
  trials_per_task: 1
  timeout_seconds: 600
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4-20250514

metrics:
  - name: task_completion
    weight: 0.5
    threshold: 0.8
    description: Does the skill guide the agent to the correct output for the workflow step?

  - name: behavior_quality
    weight: 0.3
    threshold: 0.7
    description: Clean execution, no errors, within tool call budget

  - name: instruction_adherence
    weight: 0.2
    threshold: 0.8
    description: Does the agent follow the workflow steps documented in the skill?

graders:
  - type: code
    name: has_output
    config:
      assertions:
        - "len(output) > 10"

  # no_fatal_errors removed — prereq skill SHOULD discuss potential errors
  # (e.g. "missing entry point would cause a fatal error on startup").
  # The has_output code grader catches actual agent crashes.
  # Task-level graders handle behavior-specific checks.

tasks:
  - "tasks/*.yaml"
