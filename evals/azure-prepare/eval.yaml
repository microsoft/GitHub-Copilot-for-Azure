      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
      - type: skill-invocation
        config:
          required:
            - azure-prepare
      # Must provision DTS scheduler resource
      - type: file-matches
        config:
          path: "**/*.bicep"
