  # Section 1: skill-invocation tests
  # Source: describe("skill-invocation") — lines 52-720
  # Original RUNS_PER_PROMPT = 1, invocationRateThreshold = 0.8
  # Original followUp: ["Continue with recommended options until complete."]
  #
  # Note: Original test used SKIP_QUOTA_CHECK_PROMPT systemPrompt for
  # prepare-deployment tests (not the invocation tests). The system prompt
  # appends: "Skip the Provisioning Limit Checklist (Step 6 in the plan template)..."
