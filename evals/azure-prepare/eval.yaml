  # Original FOLLOW_UP_PROMPT: ["Continue with recommended options until complete."]
  ###########################################################################

  - id: prepare-whiteboard-plan-ready
    name: "Creates project files for static whiteboard web app before validation"
    description: >
      Verifies azure-prepare creates a deployment plan with "Ready for Validation"
      status for a static whiteboard web app.
      Migrated from: test("creates project files for static whiteboard web app before validation")
      Note: Original used hasPlanReadyForValidation() which checks for edit tool calls
      containing "Ready for Validation" in deployment-plan.md.
      Original systemPrompt: SKIP_QUOTA_CHECK_PROMPT
    tags:
      type: integration
      tier: full
      cost: free
      area: behavior
    prompt: "Create a static whiteboard web app and deploy to Azure."
    graders:
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
      - type: skill-invocation
        config:
          required:
            - azure-prepare
      # hasPlanReadyForValidation — deployment-plan.md should be created with Ready for Validation
      - type: file-matches
        config:
          path: "**/*deployment-plan.md"
          pattern: "(?i)ready\\s+for\\s+validation"

  - id: prepare-azd-bicep-recipe
