# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/waza/main/schemas/eval.schema.json
# Migrated from: tests/azure-prepare/integration.test.ts
# Source helpers: tests/azure-prepare/utils.ts (hasPlanReadyForValidation, hasServicesSection, getServiceProject, getDockerContext)
# Also references: tests/azure-validate/utils.ts (hasValidationCommand)
name: azure-prepare-integration-eval
description: "Integration evaluation for azure-prepare skill — migrated from Jest integration tests"
skill: azure-prepare
version: "1.0"

environment:
  skills:
    - "../../plugin/skills/azure-prepare"

config:
  trials_per_task: 1
  timeout_seconds: 3600  # 60 min — matches long prepare+deploy workflows
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4-20250514

metrics:
  - name: task_completion
    weight: 0.4
    threshold: 0.8
    description: Did the skill complete the preparation task?
  - name: trigger_accuracy
    weight: 0.3
    threshold: 0.8
    description: Does the skill trigger on prepare prompts?
  - name: behavior_quality
    weight: 0.3
    threshold: 0.8
    description: Correct files generated, plan-first workflow, no fatal errors

graders:
  # Global safety graders applied to every stimulus
  - type: completed
  - type: regex
    name: no_fatal_errors
    config:
      must_not_match:
        - "(?i)fatal error|unhandled exception|stack trace"

stimuli:
