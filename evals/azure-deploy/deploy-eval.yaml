# Vally e2e eval suite for azure-deploy
# Source: tests/azure-deploy/integration.test.ts
# Covers: vanilla-static-web-apps-deploy, vanilla-app-service-deploy,
#         vanilla-azure-functions-deploy, durable-task-scheduler-deploy,
#         vanilla-azure-container-apps-deploy, terraform-static-web-apps-deploy,
#         terraform-app-service-deploy, terraform-azure-functions-deploy,
#         terraform-azure-container-apps-deploy
#
# These tests previously started from an empty workspace and asked the agent to
# both CREATE and DEPLOY an application, which conflates azure-prepare and
# azure-deploy responsibilities. Each stimulus below instead provides a
# pre-built fixture (azure.yaml + infra/) so the agent only needs to deploy.
#
# earlyTerminate fires when the agent outputs a deploy link (azurewebsites.net,
# azurestaticapps.net, azurecontainerapps.io, web.core.windows.net) — indicating
# the deployment completed and the app is live.
# NOTE: earlyTerminate tests must NOT use the `completed` grader.

name: azure-deploy-e2e-eval
description: |
  End-to-end evaluation suite for the azure-deploy skill.
  Tests deployment execution quality across:
  - Static Web Apps (Bicep + Terraform)
  - App Service (Bicep + Terraform)
  - Azure Functions (Bicep + Terraform)
  - Durable Task Scheduler (Bicep)
  - Azure Container Apps (Bicep + Terraform)

  Each scenario provides a fully prepared fixture (azure.yaml + infra/) so the
  agent is only evaluated on its azure-deploy responsibilities, not azure-prepare.

tags:
  type: integration
  skill: azure-deploy

defaults:
  runs: 1
  timeout: "55m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

stimuli:

  # ═══════════════════════════════════════════
  # vanilla-static-web-apps-deploy (Bicep)
  # Source: describe("vanilla-static-web-apps-deploy")
  # ═══════════════════════════════════════════

  # Jest: "creates whiteboard application with bicep"
  # Original problem: empty workspace, agent had to create app + deploy.
  # Fix: provide a prepared SWA fixture; agent only needs to deploy.
  - name: "Deploy SWA - Whiteboard App (Bicep)"
    prompt: "Create a static whiteboard web app and deploy it to Azure using my current subscription in the eastus2 region. Use azd as the deployment tool."
    constraints:
      max_turns: 80
    tags:
      type: integration
      tier: full
      cost: llm
      area: behavior
      skill: azure-deploy
      category: vanilla-static-web-apps-deploy
      followUp:
        - "Go with recommended options and proceed with Azure deployment."
      earlyTerminate: '[{"type":"assistant-message-match","contentPattern":"https?://[\\w.-]+(\\.azurewebsites\\.net|\\.azurestaticapps\\.net|\\.azurecontainerapps\\.io|\\.web\\.core\\.windows\\.net)"}]'
      takeScreenshot: '[{"type":"has-deployment-url","urlPattern":"https?://[\\w.-]+(\\.azurewebsites\\.net|\\.azurestaticapps\\.net|\\.azurecontainerapps\\.io|\\.web\\.core\\.windows\\.net)"}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-prepare
            - azure-deploy
      - type: tool-calls
        config:
          required:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)azd\\s+(up|provision)\\b"

  # Jest: "creates static portfolio website with bicep"
  - name: "Deploy SWA - Portfolio Website (Bicep)"
    prompt: "Create a static portfolio website and deploy it to Azure using my current subscription in the eastus2 region. Use azd as the deployment tool."
