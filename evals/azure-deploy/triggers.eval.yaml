name: azure-deploy-trigger-eval
description: "Trigger routing evaluation for azure-deploy — migrated from Jest trigger tests"
type: capability
tags:
  type: trigger
  skill: azure-deploy
environment:
  skills:
    - ../../plugin/skills/azure-deploy
config:
  runs: 3
  timeout: 120
  executor: copilot-sdk
  model: claude-sonnet-4
scoring:
  threshold: 0.8
stimuli:
  # Positive triggers — skill SHOULD be invoked
  - name: "trigger-positive-execute-deployment-to-azure-production"
    prompt: "Execute deployment to Azure production"
    tags:
      type: trigger
      tier: full
      cost: free
      polarity: positive
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-deploy
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
  - name: "trigger-positive-deploy-and-provision-my-azure-infrastructure"
