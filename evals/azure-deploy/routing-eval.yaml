# Vally eval config — migrated from Waza
# Source: tests/azure-deploy/eval/eval.yaml + tasks/*.yaml
# Migration: Waza → Vally (issue #1817, Phase 1)
#
# Global graders (evaluate#125 workaround): has_output and no_runtime_failure
# are duplicated into every stimulus block below.

name: azure-deploy-routing-eval
description: |
  Evaluation suite for the azure-deploy skill.
  Tests deployment guidance quality with emphasis on:
  - AVM+AZD pattern-module preference
  - AVM fallback when no pattern module exists
  - deploy-only routing (not prepare/validate)

tags:
  type: integration
  skill: azure-deploy

config:
  runs: 5
  timeout: "7m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8
  weights:
    output-contains: 0.5
    output-matches: 0.5
    output-not-matches: 2.0
    completed: 1.0

stimuli:
  # ── avm-order-bicep-001 ──
  # Waza source: tasks/avm-order-bicep.yaml
  # Validates deploy guidance prefers AVM+AZD pattern modules first
  - name: "AVM+AZD Priority - Bicep Deploy"
    prompt: |
      My app is already prepared and validated.
      Give me deploy guidance and module preference order for Bicep.
      Prefer AVM+AZD patterns where available, with fallback to AVM resource modules and AVM utility modules.
    tags:
      type: integration
      skill: azure-deploy
      tier: full
      cost: llm
      area: output
    graders:
      # Task: expected.output_contains
      - type: output-contains
        config:
          substring: "AVM"
      - type: output-contains
        config:
          substring: "deploy"
      - type: output-contains
        config:
          substring: "pattern"
      # Task grader: avm_pattern_first
      - type: output-matches
        config:
          pattern: "(?i)AVM\\+AZD|AZD pattern|pattern modules"
      # Task grader: includes_resource_and_utility_fallback
      - type: output-matches
        config:
          pattern: "(?is)(AVM\\+AZD|AZD pattern|pattern modules).*resource modules.*utility modules"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|exception occurred|crashed"

  # ── avm-fallback-no-pattern-001 ──
  # Waza source: tasks/avm-fallback-no-pattern.yaml
  # Validates fallback order when no AVM+AZD pattern module exists
  - name: "AVM Fallback When No AZD Pattern"
    prompt: |
      I'm deploying with Bicep and there is no AVM+AZD pattern module for my scenario.
      What module order should I follow if no pattern module exists and fallback must stay AVM resource modules then AVM utility modules?
    tags:
      type: integration
      skill: azure-deploy
      tier: full
      cost: llm
      area: output
    graders:
      # Task: expected.output_contains
      - type: output-contains
        config:
          substring: "AVM"
      - type: output-contains
        config:
          substring: "resource"
      - type: output-contains
        config:
          substring: "utility"
      # Task grader: explicit_no_pattern_fallback
      - type: output-matches
        config:
          pattern: "(?is)(no .*pattern module|if no .*pattern).*AVM.*resource.*AVM.*utility"
      # Task grader: avoids_non_avm_fallback
      - type: output-not-matches
        config:
          pattern: "(?i)fallback to non-AVM|use non-AVM modules"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|exception occurred|crashed"

  # ═══════════════════════════════════════════
  # Skill routing prompts migrated from Jest skill-invocation tests
  # Source: tests/azure-deploy/integration.test.ts
  # Stimuli with earlyTerminate tags do not use the completed grader.
  # ═══════════════════════════════════════════

  # Jest: "invokes azure-deploy skill for deployment prompt"
  - name: "Deployment"
    prompt: "Run azd up to deploy my already-prepared app to Azure"
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/Azure-Samples/azd-starter-bicep
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
      skill: azure-deploy
      earlyTerminate: '[{"type":"skill-call","skill":"azure-deploy"},{"type":"tool-call-count","count":10}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-deploy
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # Jest: "invokes azure-deploy skill for publish to Azure prompt"
  - name: "Publish To Azure"
    prompt: "My app already has azure.yaml and infra/ configured. Publish it to Azure now."
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/Azure-Samples/azd-starter-bicep
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      skill: azure-deploy
      earlyTerminate: '[{"type":"skill-call","skill":"azure-deploy"},{"type":"tool-call-count","count":10}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-deploy
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # Jest: "invokes azure-deploy skill for Azure Functions deployment prompt"
  - name: "Azure Functions Deployment"
    prompt: "Deploy my existing Azure Functions project to the cloud. The infrastructure and azure.yaml are already set up."
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/Azure-Samples/functions-quickstart-python-http-azd
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      skill: azure-deploy
      earlyTerminate: '[{"type":"skill-call","skill":"azure-deploy"},{"type":"tool-call-count","count":10}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-deploy
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # Jest: "invokes azure-deploy skill for post-deployment role assignment check prompt"
  - name: "Post-Deployment Role Assignment Check"
    prompt: "Deploy my already-prepared Azure app using azd and confirm the managed identity roles are properly assigned"
    environment:
      commands:
        - git init -q
        - git remote add origin https://github.com/Azure-Samples/functions-quickstart-dotnet-azd
        - git fetch -q --depth 1 origin main
        - git checkout -q FETCH_HEAD -- .
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      skill: azure-deploy
      earlyTerminate: '[{"type":"skill-call","skill":"azure-deploy"},{"type":"tool-call-count","count":10}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-deploy
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
