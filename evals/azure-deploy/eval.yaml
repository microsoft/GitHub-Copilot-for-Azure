name: azure-deploy-integration-eval
description: "Integration evaluation for azure-deploy skill — migrated from Jest integration tests"
skill: azure-deploy
version: "1.0"

environment:
  skills:
    - "plugin/skills/azure-deploy"

config:
  trials_per_task: 1
  timeout_seconds: 3600  # 60 min — matches deployTestTimeoutMs / brownfieldTestTimeoutMs
  parallel: false
  executor: copilot-sdk
  model: claude-sonnet-4-20250514

metrics:
  - name: task_completion
    weight: 0.4
    threshold: 0.8
    description: Did the skill complete the deployment task?
  - name: trigger_accuracy
    weight: 0.3
    threshold: 0.8
    description: Does the skill trigger on deploy prompts?
  - name: behavior_quality
    weight: 0.3
    threshold: 0.8
    description: Deploy links present, correct files generated, no fatal errors

graders:
  # Global safety graders applied to every stimulus
  - type: completed
  - type: regex
    name: no_fatal_errors
    config:
      must_not_match:
        - "(?i)fatal error|unhandled exception|stack trace"

