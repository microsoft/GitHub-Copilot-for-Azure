name: azure-resource-visualizer-trigger-eval
description: "Trigger routing evaluation for azure-resource-visualizer — migrated from Jest trigger tests"
type: capability
tags:
  type: trigger
  skill: azure-resource-visualizer
environment:
  skills:
    - ../../plugin/skills/azure-resource-visualizer
config:
  runs: 3
  timeout: 120
  executor: copilot-sdk
  model: claude-sonnet-4
