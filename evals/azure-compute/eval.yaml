# Vally eval config — migrated from Jest integration tests
# Source: tests/azure-compute/integration.test.ts
# Migration: Jest → Vally (Batch 2 — Medium)
#
# Global graders (evaluate#125 workaround): completed and no_runtime_failure
# are duplicated into every stimulus block below.
#
# Note: Jest tests used isToolCalled(metadata, "view", workflowPathPattern)
# to verify specific workflow files were opened. Vally tool-calls grader
# checks that the "view" tool was called (path pattern not expressible).

name: azure-compute-integration-eval
description: |
  Integration evaluation for azure-compute skill — migrated from Jest integration tests.
  Tests skill routing and tool-call behavior for VM recommendation, VMSS,
  and troubleshooting prompts (5 runs, 80% threshold).

tags:
  type: integration
  skill: azure-compute

environment:
  skills:
    - "../../plugin/skills/azure-compute"

config:
  runs: 5
  timeout: 600
  executor: copilot-sdk
  model: claude-sonnet-4

scoring:
  threshold: 0.8

stimuli:
  # ═══════════════════════════════════════════════════════════════════════
  # skill-invocation (with tool-call assertions)
  # ═══════════════════════════════════════════════════════════════════════

  # ── Web workload recommendation → vm-recommender ──
  # Jest: "routes web workload recommendation prompt to vm-recommender"
  # Assertions: softCheckSkill + isSkillInvoked + isToolCalled("view", RECOMMENDER_WORKFLOW_PATH)
  - name: "Web workload VM recommendation"
    prompt: "Which Azure VM size should I use for a web server handling 500 concurrent users?"
    tags:
      type: integration
      tier: full
      cost: free
      area: behavior
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-compute
      - type: tool-calls
        config:
          required:
            - name: view
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── GPU VM recommendation → vm-recommender ──
  # Jest: "routes GPU VM prompt to vm-recommender"
  # Assertions: softCheckSkill + isSkillInvoked + isToolCalled("view", RECOMMENDER_WORKFLOW_PATH)
  - name: "GPU VM recommendation"
    prompt: "I need a GPU VM on Azure for training a deep learning model. What do you recommend?"
    tags:
      type: integration
      tier: full
      cost: free
      area: behavior
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-compute
      - type: tool-calls
        config:
          required:
            - name: view
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── VMSS autoscale → vm-recommender ──
  # Jest: "routes VMSS autoscale prompt to vm-recommender"
  # Assertions: softCheckSkill + isSkillInvoked + isToolCalled("view", RECOMMENDER_WORKFLOW_PATH)
  - name: "VMSS autoscale recommendation"
    prompt: "Should I use a VM Scale Set with autoscaling for my API backend on Azure?"
    tags:
      type: integration
      tier: full
      cost: free
      area: behavior
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-compute
      - type: tool-calls
        config:
          required:
            - name: view
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── VM vs VMSS → vmss-guide ──
  # Jest: "routes VM vs VMSS prompt to vm-recommender"
  # Assertions: softCheckSkill + isSkillInvoked + isToolCalled("view", VMSS_GUIDE_PATH)
  - name: "VM vs VMSS guidance"
    prompt: "When should I use VMSS versus individual VMs on Azure?"
    tags:
