  - name: "trigger-positive-event-hub-sdk-error-in-my-python-app"
    prompt: "event hub SDK error in my Python app"
    tags:
      type: trigger
      tier: full
      cost: free
      polarity: positive
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-messaging
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
