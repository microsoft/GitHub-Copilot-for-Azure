name: azure-messaging-trigger-eval
description: "Trigger routing evaluation for azure-messaging — migrated from Jest trigger tests"
type: capability
tags:
  type: trigger
  skill: azure-messaging
environment:
  skills:
    - ../../plugin/skills/azure-messaging
config:
  runs: 3
  timeout: 120
  executor: copilot-sdk
  model: claude-sonnet-4
scoring:
  threshold: 0.8
