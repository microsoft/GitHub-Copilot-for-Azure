name: azure-upgrade-trigger-eval
description: "Trigger routing evaluation for azure-upgrade — migrated from Jest trigger tests"
type: capability
tags:
  type: trigger
  skill: azure-upgrade
environment:
  skills:
    - ../../plugin/skills/azure-upgrade
config:
  runs: 3
  timeout: 120
  executor: copilot-sdk
  model: claude-sonnet-4
scoring:
  threshold: 0.8
stimuli:
  # Positive triggers — skill SHOULD be invoked
  - name: "trigger-positive-upgrade-my-function-app-from-consumption-to-flex-cons"
    prompt: "Upgrade my function app from Consumption to Flex Consumption"
    tags:
      type: trigger
      tier: full
      cost: free
      polarity: positive
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-upgrade
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
