      tier: full
      cost: llm
      area: behavior
      followUp:
        - "Continue with recommended options until complete."
      # TODO: Add workspace-setup tag once fixture mechanism is implemented
      # workspaceSetup: '{"repoUrl":"https://github.com/weidongxu-microsoft/java-update-examples.git","commitId":"6d071296df8929482b0903241a23713a0bb952a4","sparseCheckoutPath":"azure-legacy-sdk-update-batch-java-manage-batch-accounts"}'
