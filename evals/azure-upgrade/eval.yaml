  # ── java-sdk-batch-migration ──
  # Jest: "migrates Batch defineNewApplicationPackage chain to applicationPackages().define()"
  # Setup: sparse checkout "azure-legacy-sdk-update-batch-java-manage-batch-accounts"
  # Assertions (post-migration file inspection):
  #   1. pom.xml: no <dependency> with groupId com.microsoft.azure
  #   2. pom.xml: at least one com.azure.resourcemanager dependency
  #   3. At least one .java file: applicationPackages().define( pattern present
  - name: "Java SDK migration - Batch applicationPackages define"
    prompt: >-
      Migrate my Java project from legacy Azure SDK to modern Azure SDK.
      The project can be found under azure-legacy-sdk-update-batch-java-manage-batch-accounts.
    tags:
