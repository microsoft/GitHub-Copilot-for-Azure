      #   config:
      #     - file: "pom.xml"
      #       stripComments: xml
      #       scope: dependency
      #       not-matches: "<groupId>\\s*com\\.microsoft\\.azure\\s*</groupId>"
      #     - file: "pom.xml"
      #       stripComments: xml
      #       matches: "<artifactId>\\s*azure-sdk-bom\\s*</artifactId>"
      #     - file: "pom.xml"
      #       stripComments: xml
      #       matches: "<groupId>\\s*com\\.azure\\s*</groupId>"
      #     - glob: "**/*.java"
      #       stripComments: java
      #       not-matches: "\\bInMemory[A-Z]\\w*"
      #     - glob: "**/*.java"
      #       stripComments: java
      #       any-matches: "\\bBlobCheckpointStore\\b"   # at least one file must match
      # Global: no_runtime_failure
