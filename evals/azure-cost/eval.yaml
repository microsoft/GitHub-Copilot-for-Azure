  # ── Subscription cost prediction ──
  # Jest: "invokes skill for subscription cost prediction prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Subscription cost prediction invocation"
    prompt: "Predict my subscription costs for the next 90 days"
    tags:
      type: integration
      tier: full
      cost: free
