  # ═══════════════════════════════════════════════════════════════════════
  # skill-invocation — AKS Cost prompts
  # ═══════════════════════════════════════════════════════════════════════

  # ── AKS cost analysis add-on ──
  # Jest: "invokes skill for AKS cost analysis add-on prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "AKS cost analysis add-on invocation"
    prompt: "Show me cost breakdown by Kubernetes namespace in my AKS cluster"
    tags:
      type: integration
