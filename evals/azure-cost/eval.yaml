# Vally eval config — migrated from Jest integration tests
# Source: tests/azure-cost/integration.test.ts
# Migration: Jest → Vally (Batch 2 — Medium)
#
# Global graders (evaluate#125 workaround): completed and no_runtime_failure
# are duplicated into every stimulus block below.

name: azure-cost-integration-eval
description: |
  Integration evaluation for azure-cost skill — migrated from Jest integration tests.
  Tests skill routing for cost query, forecast, optimization, and AKS cost prompts
  plus response quality validation (3 runs, 80% threshold).

tags:
  type: integration
  skill: azure-cost

environment:
  skills:
    - "plugin/skills/azure-cost"

config:
  runs: 3
  timeout: 600
  executor: copilot-sdk
  model: claude-sonnet-4

scoring:
  threshold: 0.8

stimuli:
  # ═══════════════════════════════════════════════════════════════════════
  # skill-invocation — Cost Query prompts
  # ═══════════════════════════════════════════════════════════════════════

  # ── Monthly cost ──
  # Jest: "invokes skill for monthly cost prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Monthly cost invocation"
    prompt: "What are my Azure costs this month?"
    tags:
      type: integration
      tier: full
      cost: free
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-cost
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── Cost breakdown ──
  # Jest: "invokes skill for cost breakdown prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Cost breakdown invocation"
    prompt: "Show me cost breakdown by service for my subscription"
    tags:
      type: integration
      tier: full
      cost: free
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-cost
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── Resource group cost ──
  # Jest: "invokes skill for resource group cost query"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Resource group cost invocation"
