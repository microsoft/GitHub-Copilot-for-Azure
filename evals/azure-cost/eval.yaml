      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── AKS cost anomaly investigation ──
  # Jest: "invokes skill for AKS cost anomaly investigation prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "AKS cost anomaly investigation invocation"
    prompt: "My AKS cluster costs spiked unexpectedly last Sunday from 2am to 4pm EST, help me investigate"
    tags:
      type: integration
      tier: full
      cost: free
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-cost
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ═══════════════════════════════════════════════════════════════════════
  # response-quality
  # ═══════════════════════════════════════════════════════════════════════

  # ── Forecast keywords ──
  # Jest: "response contains forecast-related keywords"
  # Assertions: doesAssistantMessageIncludeKeyword("forecast") OR "projected" OR "estimate"
  - name: "Forecast keyword content"
    prompt: "What will my Azure costs be next month?"
    tags:
      type: integration
      tier: full
      cost: free
      area: output
    graders:
      - type: output-matches
        config:
          pattern: "(?i)forecast|projected|estimate"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ═══════════════════════════════════════════════════════════════════════
  # aks-cost-optimization
  # ═══════════════════════════════════════════════════════════════════════

  # ── Cost analysis add-on content ──
  # Jest: "response mentions cost analysis add-on for AKS namespace cost prompt"
  # Assertions: softCheckSkill + doesAssistantMessageIncludeKeyword("--enable-cost-analysis")
  #   OR "costAnalysis" OR "Cost Analysis"
  - name: "AKS cost analysis add-on content"
    prompt: "How do I enable namespace-level cost visibility for my AKS cluster?"
    tags:
      type: integration
      tier: full
      cost: free
      area: output
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-cost
      - type: output-matches
        config:
          pattern: "(?i)--enable-cost-analysis|costAnalysis|Cost Analysis"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── AKS monitoring commands content ──
  # Jest: "response mentions monitoring commands for AKS cost anomaly prompt"
  # Assertions: softCheckSkill + doesAssistantMessageIncludeKeyword("kubectl top")
  #   OR "az monitor metrics" OR "az consumption budget"
  - name: "AKS monitoring commands content"
    prompt: "What monitoring commands should I run to investigate a cost spike on an AKS cluster?"
    tags:
      type: integration
      tier: full
      cost: free
      area: output
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-cost
      - type: output-matches
        config:
          pattern: "(?i)kubectl top|az monitor metrics|az consumption budget"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
