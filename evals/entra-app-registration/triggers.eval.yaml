name: entra-app-registration-trigger-eval
description: "Trigger routing evaluation for entra-app-registration — migrated from Jest trigger tests"
type: capability
tags:
  type: trigger
  skill: entra-app-registration
environment:
  skills:
    - ../../plugin/skills/entra-app-registration
config:
  runs: 3
  timeout: 120
  executor: copilot-sdk
  model: claude-sonnet-4
scoring:
  threshold: 0.8
stimuli:
  # Positive triggers — skill SHOULD be invoked
  - name: "trigger-positive-how-do-i-create-an-app-registration-in-azure"
    prompt: "How do I create an app registration in Azure?"
    tags:
      type: trigger
      tier: full
      cost: free
      polarity: positive
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - entra-app-registration
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
