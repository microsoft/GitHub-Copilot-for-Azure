      area: output
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-kubernetes
      - type: output-matches
        config:
          pattern: "(?i)enable-cluster-autoscaler|min-count|scale-down"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── CAS tuning content ──
  # Jest: "response mentions autoscaler profile parameters for CAS tuning prompt"
  # Assertions: softCheckSkill + doesAssistantMessageIncludeKeyword("scale-down-unneeded-time")
  #   OR "utilization-threshold" OR "cluster-autoscaler-profile" OR "scale-down-delay"
  - name: "CAS tuning content"
    prompt: "CAS is enabled but idle nodes persist due to conservative profile settings, tune it for more aggressive scale-down"
    tags:
      type: integration
      tier: full
      cost: free
      area: output
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-kubernetes
      - type: output-matches
        config:
          pattern: "(?i)scale-down-unneeded-time|utilization-threshold|cluster-autoscaler-profile|scale-down-delay"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── Spot node pool content ──
  # Jest: "response mentions spot priority and eviction for spot node pool prompt"
  # Assertions: softCheckSkill + doesAssistantMessageIncludeKeyword("Spot") OR "eviction-policy" OR "scalesetpriority"
  - name: "Spot node pool content"
    prompt: "How do I add a Spot VM node pool to my AKS cluster?"
    tags:
