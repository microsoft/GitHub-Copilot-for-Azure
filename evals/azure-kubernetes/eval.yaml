  # ── VPA content ──
  # Jest: "response mentions VPA and recommendation mode for VPA setup prompt"
  # Assertions: softCheckSkill + doesAssistantMessageIncludeKeyword("VerticalPodAutoscaler") OR "updateMode" OR "VPA"
  - name: "VPA content"
    prompt: "How do I enable Vertical Pod Autoscaler on AKS to get rightsizing recommendations?"
    tags:
      type: integration
      tier: full
      cost: free
      area: output
    graders:
      - type: skill-invocation
        config:
          required:
