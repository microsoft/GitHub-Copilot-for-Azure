    graders:
      - type: skill-invocation
        config:
          required:
            - azure-kubernetes
      - type: output-matches
        config:
          pattern: "(?i)Spot|eviction-policy|scalesetpriority"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
