# Vally eval config — migrated from Waza and Jest integration tests
# Waza source: tests/azure-enterprise-infra-planner/evals/eval.yaml + tasks/*.yaml
# Jest source: tests/azure-enterprise-infra-planner/{integration,triggers}.test.ts
# Migration: Waza → Vally; Jest → Vally
#
# Global graders (evaluate#125 workaround): has_output, no_runtime_failure,
# and security_posture are duplicated into every Waza-migrated stimulus block.
# Jest-migrated stimuli omit these — the original Jest tests did not assert
# on runtime failure or security posture.
#
# Global efficiency constraint (max_tool_calls: 50) → constraints.max_turns: 50.

name: azure-enterprise-infra-planner-eval
description: |
  Evaluation suite for the azure-enterprise-infra-planner skill — covers
  workload planning (GenAI, AKS, Container Apps, 3-tier, serverless, data
  pipeline, ML, IoT, backup/DR), routing accuracy, plan JSON structure,
  Bicep generation under infra/, and security posture.

tags:
  type: integration
  skill: azure-enterprise-infra-planner

config:
  runs: 1
  timeout: "10m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8
  weights:
    completed: 1.0
    file-exists: 1.5
    file-matches: 1.0
    output-contains: 0.5
    output-matches: 1.0
    output-not-matches: 1.0
    skill-invocation: 1.5

stimuli:
  # ── invoke-simple-plan ──
  # Waza source: tasks/invoke-simple-plan.yaml
  # Basic plan invocation — web app + database + Redis
  - name: "Invoke Simple Plan"
    prompt: "Plan Azure infrastructure for a web app with a database and a Redis cache. Assume all defaults to create the preliminary resource list, then approve the preliminary list and proceed to plan generation."
    tags:
      type: integration
      tier: full
      cost: llm
      area: files
      skill: azure-enterprise-infra-planner
    constraints:
      max_turns: 50
    graders:
      # Task grader: skill_invoked (skill_invocation → completed in Vally;
      # skill targeting is implicit in the eval config)
      # Task grader: plan_generated (file must_exist)
      - type: file-exists
        config:
          path: "**/.azure/infrastructure-plan.json"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|crashed|unhandled exception|panic:"
      # Global: security_posture
      - type: output-not-matches
        config:
          pattern: "(?i)connection.?string.*=.*Account(Key|Name)="
      - type: output-not-matches
        config:
          pattern: "(?i)SharedAccessKey="
      - type: output-not-matches
        config:
          pattern: "(?i)masterKey="
      # Skill invocation grader (P1-3)
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]

