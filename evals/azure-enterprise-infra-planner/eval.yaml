  # ── response-jumpbox-nsgs-internal-lb ──
  # Jest: integration.test.ts → response-quality "generates infrastructure-plan.json with expected resources"
  # Assertions: skill-invocation + file-exists(.azure/insights.json, infrastructure-plan.json) + JSON schema markers
  #   + networking+compute resource types in plan + no IaC files generated (Bicep/Terraform/tfvars).
  #   followUp 2 explicitly halts the agent at the Phase 6 IaC Gate
  #   (see plugin/skills/azure-enterprise-infra-planner/references/phases/6-generate-iac.md).
  - name: "Response - Jumpbox + NSGs + Internal LB (plan only)"
    prompt: "Provision a jumpbox VM for secure management, establish NSGs for each tier, and connect tiers using internal Azure Load Balancer. Assume all defaults to make the plan."
    tags:
      type: integration
      tier: full
      cost: llm
      area: output-files
      skill: azure-enterprise-infra-planner
      followUp:
        - "The resource list looks good, proceed with generating the plan."
        - "Approve the plan as-is. Do not generate any IaC."
    constraints:
      max_turns: 50
    graders:
      - type: skill-invocation
        config:
          required: ["azure-enterprise-infra-planner"]
      # File paths use `**/...` globs because the agent non-deterministically
      # writes plan files either at workspace root or in a skill-named subdir.
      - type: file-exists
        config:
          path: "**/.azure/insights.json"
      - type: file-exists
        config:
          path: "**/.azure/infrastructure-plan.json"
      # Plan-level required fields (Jest: expect(plan.meta|inputs|plan).toHaveProperty)
      - type: json-object-rules
        config:
          path: "**/.azure/infrastructure-plan.json"
          rules:
            - type: has-property
              key: meta.planId
            - type: has-property
              key: meta.status
            - type: has-property
              key: meta.version
            - type: has-property
              key: inputs.userGoal
            - type: has-property
              key: inputs.insightsApplied
            - type: has-property
              key: plan.resources
            - type: has-property
              key: plan.overallReasoning
            - type: has-property
              key: plan.validation
      # Per-resource required fields (Jest: for (const resource of plan.plan.resources) ...)
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: '(?s)"resources".*"name"'
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: '(?s)"resources".*"type"'
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: '(?s)"resources".*"location"'
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: '(?s)"resources".*"reasoning"'
      # hasNetworking + hasCompute (Jest: resourceTypes.some(...))
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: "(?i)virtualnetwork|networksecuritygroup|loadbalancer"
      - type: file-matches
        config:
          path: "**/.azure/infrastructure-plan.json"
          pattern: "(?i)virtualmachine|compute"
      # No IaC generated (Jest: listFilesRecursive filter for .bicep/.tf/.tfvars → expect [])
      - type: file-not-exists
        config:
          path: "**/*.bicep"
      - type: file-not-exists
        config:
          path: "**/*.tf"
      - type: file-not-exists
        config:
          path: "**/*.tfvars"

  # ── response-sap-backup-bicep-generation ──
  # Jest: integration.test.ts → response-quality "generates Bicep files from approved plan"
