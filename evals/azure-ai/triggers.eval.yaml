name: azure-ai-trigger-eval
description: "Trigger routing evaluation for azure-ai — migrated from Jest trigger tests"
type: capability
tags:
  type: trigger
  skill: azure-ai
environment:
  skills:
    - ../../plugin/skills/azure-ai
config:
  runs: 3
  timeout: 120
  executor: copilot-sdk
  model: claude-sonnet-4
scoring:
  threshold: 0.8
stimuli:
  # Positive triggers — skill SHOULD be invoked
  - name: "trigger-positive-how-do-i-set-up-azure-ai-search"
    prompt: "How do I set up Azure AI Search?"
    tags:
      type: trigger
      tier: full
      cost: free
      polarity: positive
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-ai
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
