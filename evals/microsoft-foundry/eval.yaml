name: microsoft-foundry-integration-eval
description: |
  Integration and E2E evaluation for microsoft-foundry skill.
  Tests skill routing for Foundry model deployment, RAG apps, RBAC, CI/CD,
  managed identity, agent lifecycle, and dataset operations using invocation
  rate measurement (5 runs, 80% threshold). Also includes Azure-authenticated
  E2E checks tagged as type foundry-e2e.

tags:
  skill: microsoft-foundry

environment:
  skills:
    - ../../plugin/skills/microsoft-foundry

config:
  runs: 5
  timeout: "30m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

stimuli:
  # ── ai-model-deployment-prompt ──
  # Jest: "invokes microsoft-foundry skill for AI model deployment prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "AI model deployment from Foundry catalog"
    prompt: "How do I deploy an AI model from the Microsoft Foundry catalog?"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── rag-application-prompt ──
  # Jest: "invokes microsoft-foundry skill for RAG application prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "RAG application with knowledge indexes"
    prompt: "Build a RAG application with Microsoft Foundry using knowledge indexes"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── rbac-role-assignment-prompt ──
  # Jest: "invokes microsoft-foundry skill for RBAC role assignment prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "RBAC role assignment on Foundry project"
    prompt: "Grant a user the Foundry User role on my Foundry project"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── service-principal-cicd-prompt ──
  # Jest: "invokes microsoft-foundry skill for service principal CI/CD prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Service principal for Foundry CI/CD"
    prompt: "Create a service principal for my Foundry CI/CD pipeline"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── managed-identity-roles-prompt ──
  # Jest: "invokes microsoft-foundry skill for managed identity roles prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Managed identity roles for Foundry project"
    prompt: "Set up managed identity roles for my Foundry project to access Azure Storage"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── audit-role-assignments-prompt ──
  # Jest: "invokes microsoft-foundry skill for audit role assignments prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Audit Foundry project role assignments"
    prompt: "Who has access to my Foundry project? List all role assignments"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── developer-permissions-prompt ──
  # Jest: "invokes microsoft-foundry skill for developer permissions prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Assign project manager role in Foundry"
    prompt: "Make Bob a project manager in my Azure AI Foundry"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── validate-permissions-prompt ──
  # Jest: "invokes microsoft-foundry skill for validate permissions prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Validate model deployment permissions"
    prompt: "Can I deploy models to my Foundry project? Check my permissions"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── agent-lifecycle-prompt ──
  # Jest: "invokes microsoft-foundry skill for agent lifecycle prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Build and deploy a Foundry agent"
    prompt: "Help me build and deploy a Foundry agent"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── trace-to-dataset-prompt ──
  # Jest: "invokes microsoft-foundry skill for trace-to-dataset prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Create eval dataset from agent traces"
    prompt: "Create an evaluation dataset from my Foundry agent traces"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── dataset-versioning-prompt ──
  # Jest: "invokes microsoft-foundry skill for dataset versioning prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Version eval dataset and compare regressions"
    prompt: "Version my Foundry evaluation dataset and compare regressions"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── agent-optimizer-prompt ──
  - name: "Generate evals for Agent Optimizer"
    prompt: |
      I have an azd Python hosted agent that is already wired for Foundry Agent Optimizer.
      Help me create the optimizer eval.yaml from eval/travel_approval_golden.jsonl,
      generate adaptive evaluators with azd, and run optimization with an allowed
      optimizer model. Show the current eval.yaml fields I should use.
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      - type: completed
      - type: output-matches
        config:
          pattern: "(?is)azd\\s+ai\\s+agent\\s+eval\\s+generate.*--dataset"
      - type: output-matches
        config:
          pattern: "(?is)(dataset:.*local_uri.*eval/travel_approval_golden\\.jsonl|eval/travel_approval_golden\\.jsonl.*dataset:.*local_uri|local_uri:.*eval/travel_approval_golden\\.jsonl)"
      - type: output-matches
        config:
          pattern: "(?is)max_candidates|model_search_space|optimization_model"
      - type: output-not-matches
        config:
          pattern: "(?i)azd\\s+ai\\s+agent\\s+eval\\s+init"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  - name: "Scaffold Python agent for Agent Optimizer"
    prompt: |
      Make my existing azd Python hosted Foundry agent optimizer-ready. Explain the
      files and code changes you would make, including SDK wiring, baseline config,
      safe optimization targets, and when to stop for review before deployment.
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      - type: completed
      - type: output-matches
        config:
          pattern: "(?is)azure-ai-agentserver-optimization"
      - type: output-matches
        config:
          pattern: "(?is)load_config\\(\\)|load_config"
      - type: output-matches
        config:
          pattern: "(?is)\\.agent_configs[/\\\\]baseline|\\.agent_configs.*baseline"
      - type: output-matches
        config:
          pattern: "(?is)review|do not deploy|stop"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  - name: "Apply Agent Optimizer candidate locally"
    prompt: |
      Agent Optimizer finished and gave me candidate cand-123. How should I apply
      that candidate to my azd hosted agent project so the source changes are
      reviewable before deployment?
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      - type: completed
      - type: output-matches
        config:
          pattern: "(?is)azd\\s+ai\\s+agent\\s+optimize\\s+apply\\s+--candidate"
      - type: output-matches
        config:
          pattern: "(?is)diff|review|source changes"
      - type: output-matches
        config:
          pattern: "(?is)azd\\s+deploy"
      - type: output-not-matches
        config:
          pattern: "(?is)azd\\s+ai\\s+agent\\s+optimize\\s+deploy\\s+--candidate"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── agent-observe-prompts ──
  - name: "Evaluate deployed Foundry agent"
    prompt: |
      Evaluate my deployed Foundry agent using the evaluation suite in its
      .foundry metadata. Explain the setup checks and the batch evaluation call
      you should use.
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      - type: completed
      - type: output-matches
        config:
          pattern: "(?is)evaluation_agent_batch_eval_create"
      - type: output-matches
        config:
          pattern: "(?is)inputData"
      - type: output-matches
        config:
          pattern: "(?is)evaluation_get|evalRunId|evalId"
      - type: output-not-matches
        config:
          pattern: "(?is)evaluation_suite_run"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  - name: "Analyze eval failures and optimize prompt"
    prompt: |
      My latest Foundry agent evaluation failed several rows. Help me download the
      detailed eval results, cluster root causes, optimize the agent prompt, and
      compare the new version against the baseline.
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      - type: completed
      - type: output-matches
        config:
          pattern: "(?is)output_items|download.*results|azure-ai-projects"
      - type: output-matches
        config:
          pattern: "(?is)cluster|root cause|failures"
      - type: output-matches
        config:
          pattern: "(?is)prompt_optimize|optimize.*prompt"
      - type: output-matches
        config:
          pattern: "(?is)evaluation_comparison_create|compare"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  - name: "Enable continuous evaluation monitoring"
    prompt: |
      Set up continuous evaluation monitoring for my Foundry agent in production.
      Include how to check existing config, choose evaluators, and enable or update
      monitoring safely.
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      - type: completed
      - type: output-matches
        config:
          pattern: "(?is)continuous_eval_get"
      - type: output-matches
        config:
          pattern: "(?is)continuous_eval_create"
      - type: output-matches
        config:
          pattern: "(?is)evaluator|deploymentName|quality|safety"
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── Foundry E2E checks ──
  - name: "Create hotel booking agent"
    tags:
      id: create-hotel-booking-agent
      type: foundry-e2e
      tier: full
      cost: llm
      area: create
    prompt: |
      Create a hotel booking AI agent app. The app should leverage an AI language model to help users search for available hotels in Seattle based on check-in/check-out dates and budget preferences. Generate the code to current workspace and if current workspace already contains a project, ask the user where to put the generated code.

      Use the current workspace root as the project root. Create generated files directly in the current workspace root unless the current workspace already contains a project and the prompt asks you to ask where to put the generated code.
      Use these environment variables as the Foundry-related configuration values:
      FOUNDRY_E2E_EVAL_PROJECT_ENDPOINT for the Foundry project endpoint,
      FOUNDRY_E2E_EVAL_ARM_RESOURCE for the existing Foundry project ARM resource ID,
      FOUNDRY_E2E_EVAL_DEPLOYMENT_MODEL for the deployment model,
      and FOUNDRY_E2E_EVAL_ACR for the Azure Container Registry endpoint.
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      - type: completed
      - type: prompt
        config:
          scoring: binary
          threshold: 1
          prompt: |
            Verify that the coding agent generated a Python hotel booking AI agent app,
            used Microsoft Agent Framework, used the Responses protocol, completed code
            generation, and ran a local test after code generation. Fail if the agent
            only gave instructions without creating project files, used a non-Python
            implementation, omitted Microsoft Agent Framework, omitted the Responses
            protocol, or did not run a local test.
      - type: file-exists
        config:
          path: ".env"
      - type: file-exists
        config:
          path: "agent.yaml"

  - name: "Create writer reviewer workflow"
    tags:
      id: create-writer-reviewer-workflow
      type: foundry-e2e
      tier: full
      cost: llm
      area: create
    prompt: |
      Create a multi-agent workflow app with Agent Framework SDK.
      Scenario:
      Writer-Reviewer content collaboration - A multi-agent workflow where a Writer and Reviewer collaborate to create and refine content.
      High-level flow: 1) writer agent receives a user request and creates initial content. 2) The content is passed to reviewer agent, who provides concise, actionable feedback. 3) Both the writer and reviewer are output executors, so the workflow yields their collaborative result as the final output.
      Output:
      The final workflow output is plain text containing the refined content after the writer-reviewer collaboration.

      Use the current workspace root as the project root. Create generated files directly in the current workspace root. Do not create a nested project folder.
      Use these environment variables as the Foundry-related configuration values:
      FOUNDRY_E2E_EVAL_PROJECT_ENDPOINT for the Foundry project endpoint,
      FOUNDRY_E2E_EVAL_ARM_RESOURCE for the existing Foundry project ARM resource ID,
      FOUNDRY_E2E_EVAL_DEPLOYMENT_MODEL for the deployment model,
      and FOUNDRY_E2E_EVAL_ACR for the Azure Container Registry endpoint.
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      - type: completed
      - type: prompt
        config:
          scoring: binary
          threshold: 1
          prompt: |
            Verify that the coding agent generated a Python Writer-Reviewer multi-agent
            workflow app, used Microsoft Agent Framework, used the Responses protocol,
            completed code generation, and ran a local test after code generation. Fail
            if the agent only gave instructions without creating project files, used a
            non-Python implementation, omitted Microsoft Agent Framework, omitted the
            Responses protocol, or did not run a local test.
      - type: file-exists
        config:
          path: ".env"
      - type: file-exists
        config:
          path: "agent.yaml"

  - name: "Deploy hosted math agent"
    tags:
      id: deploy-hosted-math-agent
      type: foundry-e2e
      tier: full
      cost: llm
      area: deploy
    prompt: |
      Build a hosted agent in Microsoft Foundry that can do basic math, and then deploy. Use an agent name with the `foundry-skill-e2e` prefix and add a random suffix.

      Use the current workspace root as the project root. Create generated files directly in the current workspace root. Do not create a nested project folder.
      Use these environment variables as the Foundry-related configuration values:
      FOUNDRY_E2E_EVAL_PROJECT_ENDPOINT for the Foundry project endpoint,
      FOUNDRY_E2E_EVAL_ARM_RESOURCE for the existing Foundry project ARM resource ID,
      FOUNDRY_E2E_EVAL_DEPLOYMENT_MODEL for the deployment model,
      and FOUNDRY_E2E_EVAL_ACR for the Azure Container Registry endpoint.
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      - type: completed
      - type: prompt
        config:
          scoring: binary
          threshold: 1
          prompt: |
            Verify that the coding agent generated hosted-agent code, deployed the agent
            successfully to Microsoft Foundry, invoked the deployed agent after deployment,
            and received a successful response from that deployed agent. Fail if
            code was not generated, deployment did not succeed, the deployed agent was not
            actually invoked after deployment, or the deployed agent invocation failed.
