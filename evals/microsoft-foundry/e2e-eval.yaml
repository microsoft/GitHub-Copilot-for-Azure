# Vally eval config for Azure-authenticated Microsoft Foundry E2E checks.
# The filename is e2e-eval.yaml so default discovery does not include it in full.

name: microsoft-foundry-e2e-eval
description: |
  E2E evaluation for the microsoft-foundry skill in a workflow that has already
  logged into Azure CLI and configured azd to use Azure CLI authentication.

tags:
  type: e2e
  skill: microsoft-foundry

config:
  runs: 3
  timeout: "30m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

stimuli:
  - name: "Create and deploy hosted agent"
    tags:
      id: create-and-deploy-hosted-agent
      type: e2e
      tier: full
      cost: llm
      area: create
    prompt: |
      Create a Python hosted agent for B2B customer onboarding and deploy it to my existing Foundry project. Use the Responses protocol. After it is done, run in locally to make sure it can run successfully; then deploy it to foundry and ensure it can respond to users correctly.

      Always create a new .venv in the working directory and install the agent's dependencies there, instead of installing them globally.
      Use the current workspace root as the project root. Create generated files directly in the current workspace root unless the current workspace already contains a project and the prompt asks you to ask where to put the generated code.
      Use an agent name with the `foundry-skill-e2e` prefix and add a random suffix.
      Use these environment variables as the Foundry-related configuration values:
      FOUNDRY_E2E_EVAL_PROJECT_ENDPOINT for the Foundry project endpoint,
      FOUNDRY_E2E_EVAL_DEPLOYMENT_MODEL for the deployment model
    graders:
      - type: skill-invocation
        config:
          required:
            - microsoft-foundry
      - type: completed
      - type: prompt
        config:
          scoring: binary
          threshold: 1
          prompt: |
            Verify that the coding agent generated hosted-agent code, ran local testing, deployed the agent
            successfully to Microsoft Foundry using direct code deploy, invoked the deployed agent after deployment,
            and received a successful response from that deployed agent. Fail if
            code was not generated, local testing was not run, deployment did not succeed, deployment did not use direct code deploy, the deployed agent was not
            actually invoked after deployment, or the deployed agent invocation failed.