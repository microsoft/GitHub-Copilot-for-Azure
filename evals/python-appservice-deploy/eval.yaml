# Vally eval config for python-appservice-deploy
# Coverage: complements the Jest end-to-end test in
# tests/python-appservice-deploy/integration.test.ts (Flask quickstart e2e
# against a real Azure subscription). This file focuses on routing — both
# positive (Flask/Django/FastAPI/generic Python prompts must invoke this
# skill) and negative (Java, Container Apps, Functions, and IaC prompts must
# route to azure-prepare instead). Tests use `earlyTerminate` to stop after
# the routing decision is observed, avoiding a full deployment per stimulus.
#
# The Flask routing stimulus also seeds a minimal Flask app fixture so the
# skill can reach its deploy code-path on a realistic workspace.
#
# Global graders (evaluate#125 workaround): completed and no_runtime_failure
# are duplicated into every stimulus block below.

name: python-appservice-deploy-eval
description: |
  Evaluation suite for the python-appservice-deploy skill.
  Validates routing for deploying Python web apps (Flask, Django, FastAPI,
  generic) to Azure App Service, plus negative routing boundaries that
  must fall through to azure-prepare (Java, Container Apps, Functions,
  Terraform/Bicep).

tags:
  type: integration
  skill: python-appservice-deploy

environment:
  skills:
    - ../../plugin/skills/python-appservice-deploy
    # azure-prepare is loaded so the negative routing stimuli below can
    # assert that prompts outside this skill's scope (Java, Container Apps,
    # Functions, IaC) actually route to azure-prepare.
    - ../../plugin/skills/azure-prepare

config:
  runs: 3
  timeout: "10m"
  executor: copilot-sdk
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

stimuli:
  # ── flask-routing ──
  # Seeds a minimal Flask app so the skill can plausibly reach its deploy
  # path. Asserts skill routing + the post-deploy contract (URL surfaced,
  # warmup-wait note, log-tail command, no endpoint probing). Terminates
  # once the skill is invoked and a handful of tool calls have run, so we
  # do not pay for a full Azure deployment on every eval run.
  - name: "Flask app deployment routing"
    prompt: "Deploy my Python Flask app to Azure App Service"
    environment:
      files:
        - src: fixture/flask-app/app.py
          dest: app.py
        - src: fixture/flask-app/requirements.txt
          dest: requirements.txt
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
      framework: flask
      earlyTerminate: '[{"type":"skill-call","skill":"python-appservice-deploy"},{"type":"tool-call-count","count":5}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - python-appservice-deploy
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace|crashed"
      # Skill rule: do NOT probe the deployed endpoint
      - type: output-not-matches
        config:
          pattern: "(?i)Invoke-WebRequest|\\bcurl\\s+http|\\bwget\\s+http"

  # ── django-routing ──
  # Routing-only: validates Django prompts route to this skill. Full e2e is
  # covered by tests/python-appservice-deploy/integration.test.ts (Flask).
  - name: "Django app deployment routing"
    prompt: "Deploy this Django app to Azure App Service"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
      framework: django
      earlyTerminate: '[{"type":"skill-call","skill":"python-appservice-deploy"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - python-appservice-deploy
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace|crashed"

  # ── fastapi-routing ──
  # Routing-only: validates FastAPI prompts route to this skill.
  - name: "FastAPI app deployment routing"
    prompt: "Deploy this FastAPI app to Azure App Service"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
      framework: fastapi
      earlyTerminate: '[{"type":"skill-call","skill":"python-appservice-deploy"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - python-appservice-deploy
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace|crashed"

  # ── generic-python-routing ──
  # Routing-only: validates generic Python (non-Flask/Django/FastAPI)
  # prompts route to the skill.
  - name: "Generic Python app deployment routing"
    prompt: "Deploy my Python app to Azure App Service"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
      framework: generic
      earlyTerminate: '[{"type":"skill-call","skill":"python-appservice-deploy"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - python-appservice-deploy
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace|crashed"

  # ── negative: Java on App Service must NOT route here ──
  # Routing boundary: this skill is Python-only. Java/Spring Boot belongs
  # to azure-prepare. Terminates as soon as azure-prepare is invoked so no
  # actual deployment runs.
  - name: "Java App Service prompt does not trigger python skill"
    prompt: "Deploy my Java Spring Boot app to Azure App Service"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing-negative
      earlyTerminate: '[{"type":"skill-call","skill":"azure-prepare"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          disallowed:
            - python-appservice-deploy
          required:
            - azure-prepare

  # ── negative: Python on Container Apps must NOT route here ──
  # Routing boundary: this skill is App Service only. Container Apps
  # belongs to azure-prepare.
  - name: "Python Container Apps prompt does not trigger python skill"
    prompt: "Deploy my Python app to Azure Container Apps"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing-negative
      earlyTerminate: '[{"type":"skill-call","skill":"azure-prepare"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          disallowed:
            - python-appservice-deploy
          required:
            - azure-prepare

  # ── negative: Python on Functions must NOT route here ──
  # Routing boundary: this skill is App Service only. Azure Functions
  # belongs to azure-prepare.
  - name: "Python Functions prompt does not trigger python skill"
    prompt: "Deploy my Python app to Azure Functions"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing-negative
      earlyTerminate: '[{"type":"skill-call","skill":"azure-prepare"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          disallowed:
            - python-appservice-deploy
          required:
            - azure-prepare

  # ── negative: Python + App Service + Terraform must NOT route here ──
  # Routing boundary: IaC keyword (Terraform) escalates to azure-prepare
  # even with App Service.
  - name: "Python App Service Terraform prompt routes to azure-prepare"
    prompt: "Deploy my Flask app to Azure App Service using Terraform"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing-negative
      earlyTerminate: '[{"type":"skill-call","skill":"azure-prepare"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          disallowed:
            - python-appservice-deploy
          required:
            - azure-prepare

  # ── negative: Python + App Service + Bicep must NOT route here ──
  # Routing boundary: IaC keyword (Bicep) escalates to azure-prepare even
  # with App Service.
  - name: "Python App Service Bicep prompt routes to azure-prepare"
    prompt: "Deploy my Flask app to Azure App Service using Bicep"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing-negative
      earlyTerminate: '[{"type":"skill-call","skill":"azure-prepare"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          disallowed:
            - python-appservice-deploy
          required:
            - azure-prepare
