# Vally eval config — script-invocation checks for azure-diagnostics
#
# Purpose: verify that when asked to collect diagnostics, the agent routes to
# the azure-diagnostics skill AND asks to run the bundled diagnostic script
# (containerapp-diagnostics / appservice-diagnostics) rather than hand-rolling
# a chain of `az` commands.
#
# These are response-quality checks (single run) that grade the trajectory's
# tool calls. They do NOT require a live Azure resource: the `tool-calls` grader
# is satisfied by the agent *invoking* the script (the shell tool call), whether
# or not the underlying `az` calls succeed. No earlyTerminate is used so the run
# proceeds far enough for the script invocation to appear in the trajectory.
#
# Global graders (evaluate#125 workaround): completed and no_runtime_failure
# are duplicated into every stimulus block below.

name: azure-diagnostics-script-invocation-eval
description: |
  Verifies the azure-diagnostics skill drives the agent to invoke its bundled
  diagnostic scripts (containerapp-diagnostics, appservice-diagnostics) when
  asked to collect all diagnostics for a Container App or App Service web app.
  Grades routing plus the presence of a shell tool call running the script.

tags:
  type: integration
  skill: azure-diagnostics

defaults:
  runs: 5
  timeout: "10m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

stimuli:
  # ── containerapp-diagnostics-invocation ──
  # Asserts: isSkillInvoked + tool call running containerapp-diagnostics.(sh|ps1)
  - name: "Container App diagnostics uses the bundled script"
    prompt: "Collect all the diagnostic info for my Azure Container App named my-app in resource group my-rg."
    config:
      runs: 1
    tags:
      type: integration
      tier: full
      cost: llm
      area: response-quality
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-diagnostics
      - type: tool-calls
        config:
          required:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)containerapp-diagnostics\\.(sh|ps1)"
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── appservice-diagnostics-invocation ──
  # Asserts: isSkillInvoked + tool call running appservice-diagnostics.(sh|ps1)
  - name: "App Service diagnostics uses the bundled script"
    prompt: "Gather all the diagnostic info for my Azure App Service web app named my-app in resource group my-rg."
    config:
      runs: 1
    tags:
      type: integration
      tier: full
      cost: llm
      area: response-quality
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-diagnostics
      - type: tool-calls
        config:
          required:
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)appservice-diagnostics\\.(sh|ps1)"
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
