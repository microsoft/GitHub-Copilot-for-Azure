# Vally eval config — migrated from Jest integration tests
# Source: tests/azure-diagnostics/integration.test.ts
# Migration: Jest → Vally (Batch 1 — Simple)
#
# Global graders (evaluate#125 workaround): completed and no_runtime_failure
# are duplicated into every stimulus block below.

name: azure-diagnostics-integration-eval
description: |
  Integration evaluation for azure-diagnostics skill — migrated from Jest integration tests.
  Tests skill routing for Container Apps troubleshooting, image pull failures,
  AKS cluster diagnostics, and Azure VM connectivity troubleshooting prompts
  using invocation rate measurement (5 runs, 80% threshold).

tags:
  type: integration
  skill: azure-diagnostics

defaults:
  runs: 5
  timeout: "10m"
  executor: integration-test-agent-runner
  model: claude-sonnet-4.6

scoring:
  threshold: 0.8

stimuli:
  # ── container-apps-troubleshooting-prompt ──
  # Jest: "invokes azure-diagnostics skill for Container Apps troubleshooting prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Container App restart troubleshooting"
    prompt: "My Azure Container App keeps restarting, how do I troubleshoot it?"
    tags:
      type: integration
      tier: smoke
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-diagnostics"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-diagnostics
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── image-pull-failure-prompt ──
  # Jest: "invokes azure-diagnostics skill for image pull failure prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "Image pull failure in Container App"
    prompt: "I'm getting an image pull failure error in my Azure Container App deployment"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-diagnostics"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-diagnostics
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── aks-troubleshooting-prompt ──
  # Jest: "invokes azure-diagnostics skill for AKS troubleshooting prompt"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "AKS pending pods and NotReady node"
    prompt: "My AKS cluster has pods stuck in Pending and one node is NotReady. Can you troubleshoot it?"
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-diagnostics"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-diagnostics
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── vm-rdp-troubleshooting-prompt ──
  # Migrated from azure-compute ownership: VM connectivity incidents now route to azure-diagnostics.
  - name: "VM RDP timeout troubleshooting"
    prompt: "I can't RDP into my Azure Windows VM. The connection times out on port 3389. Help me troubleshoot it."
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-diagnostics"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-diagnostics
          disallowed:
            - azure-compute
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
  # Migrated from azure-compute ownership: VM connectivity incidents now route to azure-diagnostics.
  - name: "VM SSH refused troubleshooting"
    prompt: "I can't SSH into my Azure Linux VM. SSH says connection refused and I need help checking NSG or firewall issues."
    tags:
      type: integration
      tier: full
      cost: llm
      area: routing
      earlyTerminate: '[{"type":"skill-call","skill":"azure-diagnostics"},{"type":"tool-call-count","count":3}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-diagnostics
          disallowed:
            - azure-compute
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── pod-evidence-script-invoked ──
  # Response-quality check: for an AKS pod-failure prompt the skill should drive the
  # agent to RUN the read-only pod-evidence evidence-bundle script rather than re-listing
  # the raw kubectl describe/logs/top sequence (issue #2507). The `tool-calls` grader
  # asserts the agent attempted to execute pod-evidence.{sh,ps1} via a shell tool.
  #
  # earlyTerminate fires the moment that shell call starts, so the agent is stopped right
  # after the attempt (no follow-on turns). Note this is a guard/optimization, not a hard
  # execution block: `tool-call-match` reacts to the `tool.execution_start` event, which
  # the SDK emits only after the (auto-approved) tool has already launched. The script is
  # read-only and, with no AKS cluster/kubectl context in CI, every kubectl call fails
  # gracefully — so it is inert regardless. Because earlyTerminate is set, the `completed`
  # grader is intentionally omitted (early-terminated runs always fail it by design).
  - name: "Pod-evidence script invoked for CrashLoopBackOff"
    prompt: "My AKS pod is stuck in CrashLoopBackOff. Gather the read-only failure evidence I need before I decide on a fix."
    config:
      runs: 1
    tags:
      type: integration
      tier: full
      cost: llm
      area: response-quality
      earlyTerminate: '[{"type":"tool-call-match","toolPattern":"^(bash|powershell|pwsh)$","argsPattern":"(?i)pod-evidence\\.(sh|ps1)"}]'
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-diagnostics
      - type: tool-calls
        config:
          required:
            # Copilot CLI uses "powershell" tool for executing scripts on Windows
            # and "bash" for executing scripts on other platforms.
            - name: "(?i)^(bash|powershell|pwsh)$"
              command: "(?i)pod-evidence\\.(sh|ps1)"
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"