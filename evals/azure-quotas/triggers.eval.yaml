name: azure-quotas-trigger-eval
description: "Trigger routing evaluation for azure-quotas — migrated from Jest trigger tests"
type: capability
tags:
  type: trigger
  skill: azure-quotas
environment:
  skills:
    - ../../plugin/skills/azure-quotas
