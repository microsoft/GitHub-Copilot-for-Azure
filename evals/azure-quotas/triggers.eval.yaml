    prompt: "How do I check my Azure quota limits?"
    tags:
      type: trigger
      tier: full
      cost: free
      polarity: positive
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-quotas
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
