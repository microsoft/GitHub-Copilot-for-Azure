name: azure-validate-trigger-eval
description: "Trigger routing evaluation for azure-validate — migrated from Jest trigger tests"
type: capability
tags:
  type: trigger
  skill: azure-validate
environment:
  skills:
    - ../../plugin/skills/azure-validate
config:
  runs: 3
  timeout: 120
  executor: copilot-sdk
  model: claude-sonnet-4
scoring:
  threshold: 0.8
stimuli:
  # Positive triggers — skill SHOULD be invoked
  - name: "trigger-positive-check-if-my-app-is-ready-to-deploy-to-azure"
    prompt: "Check if my app is ready to deploy to Azure"
    tags:
      type: trigger
      tier: full
      cost: free
      polarity: positive
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-validate
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
