# Vally eval config — migrated from Jest integration tests
# Source: tests/appinsights-instrumentation/integration.test.ts
# Migration: Jest → Vally (Batch 3A — Complex/Smaller)
#
# Global graders (evaluate#125 workaround): completed and no_runtime_failure
# are duplicated into every stimulus block below.
#
# Jest notes:
# - Invocation test 2 uses setup: writes package.json to workspace to indicate Node.js project
# - Quality test 1 uses fs.cpSync("./appinsights-instrumentation/resources/aspnetcore-app/", workspace)
#   → mapped to environment.files comment (Vally resource copying)
# - Quality test 2 uses fs.cpSync("./appinsights-instrumentation/resources/python-app/", workspace)
#   + doesWorkspaceFileIncludePattern for Python instrumentation patterns:
#     /from\s+azure\.monitor\.opentelemetry\s+import\s+configure_azure_monitor/
#     /configure_azure_monitor\s*\(/
#   → mapped to file-matches grader

name: appinsights-instrumentation-integration-eval
description: |
  Integration evaluation for appinsights-instrumentation skill — migrated from Jest
  integration tests. Tests skill routing for ASP.NET Core and Node.js instrumentation
  prompts (5 runs, 80% threshold), plus content quality checks for auto-instrumentation
  guidance and Python Azure Monitor OpenTelemetry patterns.

tags:
  type: integration
  skill: appinsights-instrumentation

config:
  runs: 5
  timeout: 600
  executor: copilot-sdk
  model: claude-sonnet-4

scoring:
  threshold: 0.8

stimuli:
  # ═══════════════════════════════════════════════════════════════════════
  # skill-invocation
  # ═══════════════════════════════════════════════════════════════════════

  # ── aspnet-core-instrumentation ──
  # Jest: "invokes skill for App Insights instrumentation request"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  - name: "ASP.NET Core App Insights instrumentation"
    prompt: "How do I add Application Insights to my ASP.NET Core web app?"
    tags:
      type: integration
      tier: full
      cost: free
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - appinsights-instrumentation
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── nodejs-telemetry ──
  # Jest: "invokes skill for Node.js telemetry request"
  # Assertions: softCheckSkill + isSkillInvoked (invocation rate ≥ 80%)
  # Jest setup: writes package.json { name: "test-app", version: "1.0.0" } to workspace
  # Vally note: workspace file creation via environment.files if supported
  - name: "Node.js telemetry request"
    prompt: "Add telemetry to my Node.js application"
    # environment:
    #   files:
    #     - content: '{"name":"test-app","version":"1.0.0"}'
    #       path: "package.json"
    tags:
      type: integration
      tier: full
      cost: free
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - appinsights-instrumentation
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ═══════════════════════════════════════════════════════════════════════
  # content-quality
  # ═══════════════════════════════════════════════════════════════════════

  # ── auto-instrumentation-aspnet ──
  # Jest: "response mentions auto-instrumentation for ASP.NET Core App Service app"
  # Assertions: doesAssistantMessageIncludeKeyword(agentMetadata, "auto-instrument")
  # Jest setup: fs.cpSync("./appinsights-instrumentation/resources/aspnetcore-app/", workspace)
  # Vally note: resource copying not directly supported; copilot-sdk executor may handle
  #   workspace differently. The prompt is self-contained enough to trigger correct guidance.
  - name: "ASP.NET Core auto-instrumentation guidance"
    prompt: "Add App Insights instrumentation to my C# web application in Azure App Service"
    # environment:
    #   files:
    #     - src: "tests/appinsights-instrumentation/resources/aspnetcore-app/"
    #       dest: "."
    tags:
      type: integration
      tier: full
      cost: free
      area: output
    graders:
      - type: output-contains
        config:
          substring: "auto-instrument"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"

  # ── python-instrumentation-code ──
  # Jest: "mentions App Insights in response"
  # Assertions:
  #   1. doesAssistantMessageIncludeKeyword(agentMetadata, "App Insights") ||
  #      doesAssistantMessageIncludeKeyword(agentMetadata, "Application Insights")
  #   2. doesWorkspaceFileIncludePattern(workspacePath, /from\s+azure\.monitor\.opentelemetry\s+import\s+configure_azure_monitor/, /\.(py)$/) ||
  #      doesWorkspaceFileIncludePattern(workspacePath, /configure_azure_monitor\s*\(/, /\.(py)$/)
  # Jest setup: fs.cpSync("./appinsights-instrumentation/resources/python-app/", workspace)
  # Vally note: resource copying and workspace file inspection limitations documented.
  #   output-contains checks the response text; file-matches checks workspace files.
  - name: "Python App Insights instrumentation with code"
    prompt: "Instrument my Python web app with Application Insights in Azure Container App"
    # environment:
    #   files:
    #     - src: "tests/appinsights-instrumentation/resources/python-app/"
    #       dest: "."
    tags:
      type: integration
      tier: full
      cost: free
      area: output
    graders:
      - type: output-contains
        config:
          # Jest checked: "App Insights" OR "Application Insights"
          substring: "Insights"
      - type: file-matches
        config:
          path: "**/*.py"
          pattern: "configure_azure_monitor"
      # Global: has_output
      - type: completed
      # Global: no_runtime_failure
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
