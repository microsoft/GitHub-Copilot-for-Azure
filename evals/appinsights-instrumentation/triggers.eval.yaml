name: appinsights-instrumentation-trigger-eval
description: "Trigger routing evaluation for appinsights-instrumentation — migrated from Jest trigger tests"
type: capability
tags:
  type: trigger
  skill: appinsights-instrumentation
environment:
  skills:
    - ../../plugin/skills/appinsights-instrumentation
config:
  runs: 3
  timeout: 120
  executor: copilot-sdk
  model: claude-sonnet-4
scoring:
  threshold: 0.8
stimuli:
  # Positive triggers — skill SHOULD be invoked
  - name: "trigger-positive-instrument-my-webapp-to-send-telemetry-to-app-insight"
    prompt: "Instrument my webapp to send telemetry to App Insights"
    tags:
      type: trigger
      tier: full
      cost: free
      polarity: positive
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - appinsights-instrumentation
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
  - name: "trigger-positive-how-do-i-instrument-my-app-with-azure-app-insights"
