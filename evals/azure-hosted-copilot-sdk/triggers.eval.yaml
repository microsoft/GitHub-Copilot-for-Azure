name: azure-hosted-copilot-sdk-trigger-eval
description: "Trigger routing evaluation for azure-hosted-copilot-sdk — migrated from Jest trigger tests"
type: capability
tags:
  type: trigger
  skill: azure-hosted-copilot-sdk
environment:
  skills:
    - ../../plugin/skills/azure-hosted-copilot-sdk
config:
  runs: 3
  timeout: 120
  executor: copilot-sdk
  model: claude-sonnet-4
scoring:
  threshold: 0.8
stimuli:
  # Positive triggers — skill SHOULD be invoked
  - name: "trigger-positive-build-a-copilot-sdk-app-and-deploy-it"
    prompt: "Build a Copilot SDK app and deploy it"
    tags:
      type: trigger
      tier: full
      cost: free
      polarity: positive
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-hosted-copilot-sdk
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
  - name: "trigger-positive-create-a-new-copilot-sdk-service"
