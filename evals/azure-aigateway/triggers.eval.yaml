name: azure-aigateway-trigger-eval
description: "Trigger routing evaluation for azure-aigateway — migrated from Jest trigger tests"
type: capability
tags:
  type: trigger
  skill: azure-aigateway
environment:
  skills:
    - ../../plugin/skills/azure-aigateway
config:
  runs: 3
  timeout: 120
  executor: copilot-sdk
  model: claude-sonnet-4
scoring:
  threshold: 0.8
stimuli:
  # Positive triggers — skill SHOULD be invoked
  - name: "trigger-positive-set-up-an-ai-gateway-for-my-azure-openai-models"
    prompt: "Set up an AI Gateway for my Azure OpenAI models"
    tags:
      type: trigger
      tier: full
      cost: free
      polarity: positive
      area: routing
    graders:
      - type: skill-invocation
        config:
          required:
            - azure-aigateway
      - type: completed
      - type: output-not-matches
        config:
          pattern: "(?i)fatal error|unhandled exception|stack trace"
